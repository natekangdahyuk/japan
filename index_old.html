<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레벨4 학습 카테고리</title>
    <style>
        :root {
            --season2-bg: #e3f2fd;
            --season2-btn: #1976d2;
            --season1-bg: #f1f8e9;
            --season1-btn: #4CAF50;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .section-title {
            width: 100%;
            max-width: 400px;
            font-size: 1rem;
            font-weight: bold;
            color: #555;
            margin: 20px 0 10px 5px;
            padding-left: 5px;
            border-left: 4px solid var(--season2-btn);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        /* 시즌 2 (9-16) 스타일 */
        .season2-box { background-color: var(--season2-bg); border: 1px solid #bbdefb; }
        .btn-s2 { background-color: var(--season2-btn); }
        
        /* 시즌 1 (1-8) 스타일 */
        .season1-box { background-color: var(--season1-bg); border: 1px solid #dcedc8; }
        .btn-s1 { background-color: var(--season1-btn); }
        .s1-title { border-left-color: var(--season1-btn); color: #777; }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 15px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <div class="section-title">✨ NEW SEASON (9-16)</div>
    <div class="container season2-box">
        <a href="09.html" class="btn btn-s2">9번</a>
        <a href="10.html" class="btn btn-s2">10번</a>
        <a href="11.html" class="btn btn-s2">11번</a>
        <a href="12.html" class="btn btn-s2">12번</a>

        <a href="13.html" class="btn btn-s2">13번</a>
        <a href="14.html" class="btn btn-s2">14번</a>
        <a href="15.html" class="btn btn-s2">15번</a>
        <a href="16.html" class="btn btn-s2">16번</a>
    </div>

    <div class="section-title s1-title">✅ SEASON 1 (1-8)</div>
    <div class="container season1-box">
        <a href="01.html" class="btn btn-s1">1번</a>
        <a href="02.html" class="btn btn-s1">2번</a>
        <a href="03.html" class="btn btn-s1">3번</a>
        <a href="04.html" class="btn btn-s1">4번</a>

        <a href="05.html" class="btn btn-s1">5번</a>
        <a href="06.html" class="btn btn-s1">6번</a>
        <a href="07.html" class="btn btn-s1">7번</a>
        <a href="08.html" class="btn btn-s1">8번</a>
    </div>

</body>
</html>
