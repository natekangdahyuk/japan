<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다혁 일본어 학습 - 메인</title>    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-dark: #121212;       /* 전체 딥 블랙 배경 */
            --card-bg: #1e1e1e;       /* 섹션 박스 배경 (약간 밝은 그레이) */
            --border-color: #333333;  /* 박스 경계선 */
            --text-main: #e0e0e0;     /* 기본 글자색 */
            --text-muted: #888888;    /* 흐린 글자색 */
            --s1-point: #4CAF50;      /* 시즌 1 포인트 (초록) */
            --s2-point: #1976d2;      /* 시즌 2 포인트 (파랑) */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 헤더 바 */
        .header {
            width: 100%;
            max-width: 450px;
            padding: 10px 0;
            text-align: left;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        /* 시즌 섹션 공통 */
        .season-section {
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color); /* 외곽선으로 경계 명확화 */
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* 그림자로 공중 부양 효과 */
            box-sizing: border-box;
        }

        .season-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .season-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .season-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 버튼 그리드 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-num {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-num:active { transform: scale(0.9); }

        /* 시즌 1 스타일 */
        .s1 .season-title { color: var(--s1-point); }
        .s1 .btn-num { background-color: #2e7d32; }
        .s1 .btn-num:hover { background-color: var(--s1-point); }

        /* 시즌 2 스타일 */
        .s2 .season-title { color: var(--s2-point); }
        .s2 .btn-num { background-color: #1565c0; }
        .s2 .btn-num:hover { background-color: var(--s2-point); }

        /* 랜덤 버튼 스타일 */
        .btn-random {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .s1 .btn-random { background-color: #1b5e20; }
        .s1 .btn-random:hover { background-color: #2e7d32; }

        .s2 .btn-random { background-color: #0d47a1; }
        .s2 .btn-random:hover { background-color: #1565c0; }

        /* 하단 푸터 */
        .footer {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇯🇵 DA-HYUK JAPANESE</h1>
    </div>

    <div class="season-section s1">
        <div class="season-header">
            <span class="season-title">SEASON 01</span>
            <span class="season-desc">기초 다지기</span>
        </div>
        <div class="grid">
            <a href="study.html?s=s01&id=001" class="btn-num">1</a>
            <a href="study.html?s=s01&id=002" class="btn-num">2</a>
            <a href="study.html?s=s01&id=003" class="btn-num">3</a>
            <a href="study.html?s=s01&id=004" class="btn-num">4</a>
            <a href="study.html?s=s01&id=005" class="btn-num">5</a>
            <a href="study.html?s=s01&id=006" class="btn-num">6</a>
            <a href="study.html?s=s01&id=007" class="btn-num">7</a>
            <a href="study.html?s=s01&id=008" class="btn-num">8</a>
            <a href="study.html?s=s01&id=011" class="btn-num">11</a>
            </div>
        <a href="random.html?s=s01" class="btn-random">시즌 1 무한 랜덤 학습</a>
    </div>

    <div class="season-section s2">
        <div class="season-header">
            <span class="season-title">SEASON 02</span>
            <span class="season-desc">심화 표현</span>
        </div>
        <div class="grid">
            <a href="study.html?s=s02&id=001" class="btn-num">1</a>
            <a href="study.html?s=s02&id=002" class="btn-num">2</a>
            <a href="study.html?s=s02&id=003" class="btn-num">3</a>
            <a href="study.html?s=s02&id=004" class="btn-num">4</a>
            <a href="study.html?s=s02&id=005" class="btn-num">5</a>
            </div>
        <a href="random.html?s=s02" class="btn-random">시즌 2 무한 랜덤 학습</a>
    </div>

    <div class="footer">
        © 2026 Dahyuk. Powered by Firebase.
    </div>

</body>
</html>
