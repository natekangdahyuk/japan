<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다혁 일본어 학습 - 메인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --text-main: #e0e0e0;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'BIZ UDGothic', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 헤더 바 */
        .header {
            width: 100%;
            max-width: 450px;
            padding: 10px 0;
            text-align: left;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        /* 시즌 섹션 공통 */
        .season-section {
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            --season-point: #4CAF50;
            --season-btn: #2e7d32;
            --season-random: #1b5e20;
            --season-random-hover: #2e7d32;
        }

        .season-title { color: var(--season-point); }
        .btn-num { background-color: var(--season-btn); }
        .btn-num:hover { background-color: var(--season-point); }
        .btn-random { background-color: var(--season-random); }
        .btn-random:hover { background-color: var(--season-random-hover); }

        .season-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .season-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* 버튼 그리드 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-num {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-num:active { transform: scale(0.9); }

        .btn-random {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .loading-msg {
            width: 100%;
            max-width: 450px;
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
        }

        /* 하단 푸터 */
        .footer {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇯🇵 DA-HYUK JAPANESE</h1>
    </div>

    <div id="seasons-root" class="loading-msg">시즌 목록 불러오는 중…</div>

    <div class="footer">
        © 2026 Dahyuk. Powered by Firebase.
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/season-index.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: 'AIzaSyCxhDRXkY5Li5rXItmQpMhxEYRKsyZJHoo',
            authDomain: 'japanese-fd10c.firebaseapp.com',
            projectId: 'japanese-fd10c',
            storageBucket: 'japanese-fd10c.firebasestorage.app',
            messagingSenderId: '636416095711',
            appId: '1:636416095711:web:d9b5473a87f7dbd6c3c06a',
            databaseURL: 'https://japanese-fd10c-default-rtdb.asia-southeast1.firebasedatabase.app/'
        });
        var db = firebase.database();
        SeasonIndex.init({
            studyPage: 'study',
            randomPage: 'random',
            emptyMessage: 'Firebase에 등록된 시즌이 없습니다.',
            errorMessage: 'Firebase 연결에 실패했습니다.',
            discover: function () { return SeasonIndex.discoverFirebaseSeasons(db); }
        });
    </script>
</body>
</html>
