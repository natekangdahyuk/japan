<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다혁 전용 일본어 학습 시즌 2 (v1.2)</title>
    <style>
        :root {
            --primary-color: #1976d2; /* 시즌 2 파란색 테마 */
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-sub: #666;
            --accent-color: #e3f2fd;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        #app {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card-header {
            font-size: 0.9rem;
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .question {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            word-break: keep-all;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .info-line {
            display: flex;
            justify-content: center;
            gap: 10px;
            background: var(--accent-color);
            padding: 8px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .example-box {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .example-item {
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 3px solid var(--primary-color);
        }

        .jp-text { font-size: 1.1rem; color: var(--primary-color); }
        .kr-text { font-size: 0.95rem; color: var(--text-sub); }

        .tip-box {
            background: #fff9c4;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: left;
            border-left: 5px solid #fbc02d;
        }

        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 2rem;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:disabled { background: #ccc; }
        .home-btn { grid-column: span 2; background: #546e7a; margin-top: 5px; }

        @media (max-width: 400px) {
            .question { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="card-container">
        <div class="card-header">CARD <span id="card-num">1</span> / 25</div>
        <div class="question" id="q-text">질문 로딩중...</div>
        
        <div id="answer-section" style="display:none;">
            <div class="info-line" id="info-line"></div>
            <div class="example-box" id="ex-box"></div>
            <div class="tip-box" id="tip-text"></div>
        </div>

        <div class="nav-buttons">
            <button onclick="toggleAnswer()" id="ans-btn">정답 보기</button>
            <button onclick="nextCard()" id="next-btn">다음</button>
            <button onclick="prevCard()" id="prev-btn">이전</button>
            <button class="home-btn" onclick="location.href='index.html'">목록으로 돌아가기</button>
        </div>
    </div>
</div>

<script>
    const data = [
        { q: `引き出し`, r: `ひきだし`, m: `서랍`, u: `칼은 저 서랍 안에 있습니다.`, tip: `히키(당기다) + 다시(내다) = 당겨서 내는 것, 즉 '서랍'이야!` },
        { q: `包丁`, r: `ほうちょう`, m: `칼, 식칼`, u: `그 칼 나한테 넘겨.`, tip: `부엌에서 쓰는 식칼을 주로 의미해. '호-쵸-' 발음 주의!` },
        { q: `怖い`, r: `こわい`, m: `무섭다`, u: `귀신의 집은 전혀 무섭지 않았습니다.`, tip: `감정적으로 무서울 때 쓰는 단어. '코와이'!` },
        { q: `幽霊屋敷`, r: `ゆうれいやしき`, m: `귀신의 집`, u: `유령 저택(귀신의 집)은 무서워요.`, tip: `유령(유-레이) + 저택(야시키)이 합쳐진 말이야.` },
        { q: `幽霊`, r: `ゆうれい`, m: `유령`, u: `이 방에 유령이 나온다나 봐.`, tip: `다리가 없는 전형적인 유령을 말할 때 주로 써.` },
        { q: `お化け`, r: `おばけ`, m: `귀신, 요괴`, u: `귀신이 나타났다! 도망쳐!`, tip: `모습이 변하는 것(바케루)에서 유래한 단어야.` },
        { q: `小説`, r: `しょうせつ`, m: `소설`, u: `네가 쓴 소설은 정말 지루하구나.`, tip: `말(言)로 설명(説)하는 작은(小) 이야기.` },
        { q: `結構`, r: `けっこう`, m: `제법, 꽤`, u: `제법 근력 운동을 합니다.`, tip: `충분하다는 뜻도 있지만, 여기선 '생각보다 꽤'라는 뜻!` },
        { q: `筋トレ`, r: `きんとれ`, m: `근력 운동`, u: `매일 근력 운동을 하고 있어요.`, tip: `근육(킨니쿠) + 트레이닝(토레-닝구)의 줄임말.` },
        { q: `結婚式`, r: `けっこんしき`, m: `결혼식`, u: `네 결혼식은 정말 지루했어.`, tip: `결혼 + 식(의식). 일본 결혼식은 축의금이 비싸기로 유명하지.` },
        { q: `部活`, r: `ぶかつ`, m: `동아리 활동`, u: `토요일은 동아리 시합이야.`, tip: `부 활동(부카츠도-)의 줄임말. 일본 학교 생활의 꽃!` },
        { q: `試合`, r: `しあい`, m: `시합`, u: `그런 시합, 절대로 질 거야.`, tip: `서로(合) 시험(試)해 본다는 뜻에서 유래.` },
        { q: `～に しようか`, r: `~니 시요우카`, m: `~로 할까?`, u: `시합은 언제로 할까?`, tip: `제안할 때 쓰는 표현이야. 선택지를 좁힐 때 굿!` },
        { q: `なら、日曜日に`, r: `나라, 니치요-비니`, m: `그럼 일요일에`, u: `그럼 일요일에 하자. 절대 지지 마.`, tip: `조건의 '나라(~라면/그럼)'와 요일을 합친 문장.` },
        { q: `支度しないと`, r: `したくしないと`, m: `준비해야 해`, u: `월요일에는 전부 준비해야 해.`, tip: `시타쿠(支度)는 외출이나 식사 등 '당장 필요한 채비'를 뜻해!` },
        { q: `頑張れば`, r: `がんばれば`, m: `힘내면 (가정)`, u: `월요일에 힘내면 괜찮겠죠.`, tip: `간바루(힘내다)의 에단+바 형태. '간바레바'!` },
        { q: `大雨`, r: `おおあめ`, m: `폭우`, u: `폭우로 비행기 출발이 늦어졌어.`, tip: `큰(大) 비(雨). 일본은 태풍 때 오오아메 경보가 자주 떠.` },
        { q: `出発が遅れた`, r: `しゅっぱつがおくれた`, m: `출발이 늦어졌다`, u: `비행기 출발이 지연됐어. 지금 난리야.`, tip: `오쿠레루(늦다)의 과거형. 비행기나 기차에 자주 쓰여.` },
        { q: `降らなきゃいいね`, r: `ふらなきゃいいね`, m: `안 오면 좋겠네`, u: `비가 안 오면 좋겠다.`, tip: `후라나이(안 내리다) + 나캬(가정) + 이이네(좋겠네).` },
        { q: `格好`, r: `かっこう`, m: `모양, 모습, 옷차림`, u: `어떤 차림으로 가나요?`, tip: `발음 팁: '갓 고운 옷차림'! 겉모습이나 폼을 뜻해.` },
        { q: `女の人はどんな格好で行きますか`, r: `온나노 히토와 돈나 캇코우데 이키마스카`, m: `그 여자는 어떤 차림으로 가나요?`, u: `결혼식에 어떤 옷을 입고 가나요?`, tip: `복장이나 스타일을 물어볼 때 쓰는 완벽한 문장.` },
        { q: `着ないの？`, r: `きない contractual`, m: `안 입어?`, u: `나랑 커플티 안 입을 거야?`, tip: `키루(입다)의 부정형. 상의를 입을 때 쓰는 동사야.` },
        { q: `流行している`, r: `りゅうこうしている`, m: `유행하고 있다`, u: `이 디자인, 지금 아주 유행하고 있어.`, tip: `류우코우(유행). 트렌드를 따를 때 쓰는 필수 단어!` },
        { q: `スケジュール、何ですが…`, r: `스케쥬-루, 난데스가...`, m: `일정 말입니다만...`, u: `오늘 일정 말입니다만, 확인 부탁드려요.`, tip: `문장을 흐리며 상대의 반응을 살피는 고단수 비즈니스 표현!` },
        { q: `ことに なりました`, r: `ことに なりました`, m: `~하게 되었습니다`, u: `손님이 오시게 되었습니다.`, tip: `자신의 의지가 아닌 상황의 결정에 대해 보고할 때 필수!` }
    ];

    let currentIndex = 0;

    function init() {
        // LocalStorage 확인
        const saved = localStorage.getItem('lastCardIndex');
        const hash = window.location.hash.replace('#card', '');
        
        if (hash && !isNaN(hash)) {
            currentIndex = parseInt(hash) - 1;
        } else if (saved) {
            currentIndex = parseInt(saved);
        }
        showCard();
    }

    function showCard() {
        const item = data[currentIndex];
        document.getElementById('card-num').innerText = currentIndex + 1;
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('info-line').innerText = `${item.r} / ${item.m}`;
        document.getElementById('ex-box').innerHTML = `<div class="example-item"><div class="jp-text">${item.q}</div><div class="kr-text">${item.u}</div></div>`;
        document.getElementById('tip-text').innerHTML = `<strong>💡 Tip:</strong> ${item.tip}`;
        
        document.getElementById('answer-section').style.display = 'none';
        document.getElementById('ans-btn').innerText = '정답 보기';
        
        // 상태 저장
        localStorage.setItem('lastCardIndex', currentIndex);
        window.location.hash = `card${currentIndex + 1}`;
    }

    function toggleAnswer() {
        const section = document.getElementById('answer-section');
        if (section.style.display === 'none') {
            section.style.display = 'block';
            document.getElementById('ans-btn').innerText = '숨기기';
        } else {
            section.style.display = 'none';
            document.getElementById('ans-btn').innerText = '정답 보기';
        }
    }

    function nextCard() {
        if (currentIndex < data.length - 1) {
            currentIndex++;
            showCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            showCard();
        }
    }

    window.onload = init;
</script>

</body>
</html>
