<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다혁 일본어 - 무한 랜덤 모드 (v1.7)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1976d2; --bg: #f0f4f8; --text: #2d3436; --accent: #e67e22; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; color: var(--text); }
        h1 { font-size: 0.9rem; color: #546e7a; margin: 10px 0 20px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .container { width: 100%; max-width: 400px; }
        .card { 
            background: white; border-radius: 20px; padding: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center; 
            min-height: 420px; display: flex; flex-direction: column; 
            position: relative; border: 1px solid rgba(25, 118, 210, 0.1); 
            /* 🔥 클릭 커서 제거 (이제 카드는 버튼이 아님) */
            cursor: default; 
        }

        .question { font-family: 'Noto Sans JP', sans-serif; font-size: 2.6rem; font-weight: 700; color: var(--primary); margin: auto 0; word-break: break-all; line-height: 1.2; }
        
        .answer { display: none; border-top: 1px solid #edf2f7; padding-top: 20px; text-align: left; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .reading { font-size: 1.15rem; color: #78909c; font-weight: 600; margin-bottom: 6px; }
        .info-line { display: flex; align-items: baseline; gap: 8px; margin-bottom: 15px; }
        .meaning { font-size: 1.3rem; font-weight: 700; color: #263238; }
        .usage-tag { font-size: 0.85rem; color: var(--accent); font-weight: 600; }
        
        .example { font-size: 0.95rem; color: #455a64; line-height: 1.6; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 12px; white-space: pre-wrap; border-left: 4px solid #cbd5e1; }
        .tip-box { background: #fff9db; padding: 12px; border-radius: 10px; font-size: 0.85rem; color: #856404; border: 1px solid #ffeeba; white-space: pre-wrap; }
        
        .origin-tag { display: block; margin-top: 15px; font-size: 0.75rem; color: #b0bec5; font-weight: 500; text-align: right; letter-spacing: 0.5px; }

        .nav-main { margin-top: 25px; display: flex; gap: 12px; width: 100%; }
        button { padding: 16px; border: none; border-radius: 14px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.2s; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-view { background: #cfd8dc; color: #455a64; }
        .btn-next { background: var(--primary); color: white; }
        button:active { transform: translateY(2px); box-shadow: none; }
        
        .nav-sub { margin-top: 20px; }
        .nav-sub a { text-decoration: none; color: #90a4ae; font-size: 0.9rem; font-weight: 500; }
        .status { margin-top: 15px; font-size: 0.85rem; color: #b0bec5; font-weight: 600; }
    </style>
</head>
<body>
    <h1 id="study-title">RANDOM MODE</h1>

    <div class="container">
        <div class="card" id="main-card">
            <div id="question" class="question">데이터 충전 중...</div>
            <div id="answer" class="answer">
                <div id="reading" class="reading"></div>
                <div class="info-line">
                    <span id="meaning" class="meaning"></span>
                    <span id="usage" class="usage-tag"></span>
                </div>
                <div id="example" class="example"></div>
                <div id="tip" class="tip-box"></div>
                <div id="origin" class="origin-tag"></div>
            </div>
        </div>

        <div class="nav-main">
            <button class="btn-view" onclick="toggleAnswer()">정답 확인</button>
            <button class="btn-next" onclick="nextCard()">다음 단어</button>
        </div>

        <div class="nav-sub">
            <a href="index.html">← 목록으로 돌아가기</a>
        </div>

        <div class="status">학습한 단어: <span id="count">0</span>개</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxhDRXkY5Li5rXItmQpMhxEYRKsyZJHoo",
            authDomain: "japanese-fd10c.firebaseapp.com",
            projectId: "japanese-fd10c",
            storageBucket: "japanese-fd10c.firebasestorage.app",
            messagingSenderId: "636416095711",
            appId: "1:636416095711:web:d9b5473a87f7dbd6c3c06a",
            databaseURL: "https://japanese-fd10c-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allWords = [];
        let solvedCount = 0;

        const urlParams = new URLSearchParams(window.location.search);
        let sParam = urlParams.get('s') || 's01';
        const seasonId = sParam.startsWith('s') ? sParam : 's' + sParam;

        function loadSeasonData() {
            const dbPath = `seasons/${seasonId}`;
            
            db.ref(dbPath).once('value').then((snapshot) => {
                const seasonData = snapshot.val();
                if (!seasonData) {
                    document.getElementById('question').innerText = "데이터가 없습니다.";
                    return;
                }

                allWords = [];
                Object.keys(seasonData).forEach(setKey => {
                    const setData = seasonData[setKey];
                    if(Array.isArray(setData)) {
                        setData.forEach(word => {
                            allWords.push({
                                ...word,
                                originSeason: seasonId.toUpperCase(),
                                originSet: setKey
                            });
                        });
                    }
                });

                document.getElementById('study-title').innerText = `${seasonId.toUpperCase()} RANDOM`;
                nextCard();
            }).catch(err => {
                document.getElementById('question').innerText = "연결 오류!";
                console.error(err);
            });
        }

        function nextCard() {
            if (allWords.length === 0) return;
            
            const randomIndex = Math.floor(Math.random() * allWords.length);
            const currentWord = allWords[randomIndex];

            document.getElementById('question').innerText = currentWord.q;
            document.getElementById('reading').innerText = currentWord.r;
            document.getElementById('meaning').innerText = currentWord.m;
            document.getElementById('usage').innerText = currentWord.u ? `(${currentWord.u})` : "";
            document.getElementById('example').innerText = currentWord.e || "예문이 없습니다.";
            
            const tipContent = currentWord.tip ? currentWord.tip.replace(/\n/g, '<br>') : "팁이 없습니다.";
            document.getElementById('tip').innerHTML = `<strong>💡 Tip</strong><br>${tipContent}`;
            
            document.getElementById('origin').innerText = `Source: [${currentWord.originSeason}-${currentWord.originSet}]`;

            document.getElementById('answer').style.display = 'none';
            solvedCount++;
            document.getElementById('count').innerText = solvedCount - 1;
        }

        function toggleAnswer() {
            const ans = document.getElementById('answer');
            ans.style.display = (ans.style.display === 'none') ? 'block' : 'none';
        }

        window.onload = loadSeasonData;
    </script>
</body>
</html>
