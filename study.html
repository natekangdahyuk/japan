<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다혁 일본어 학습 - 통합 모드 (v1.3)</title>
    <style>
        :root { --primary: #4A90E2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #333; margin-bottom: 10px; font-size: 1.5rem; text-align: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; min-height: 400px; display: flex; flex-direction: column; justify-content: center; position: relative; cursor: default; }
        .question { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; word-break: keep-all; }
        .answer { display: none; border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; text-align: left; }
        .reading { font-size: 1.2rem; color: #666; font-weight: bold; }
        .meaning { font-size: 1.1rem; color: #333; margin: 10px 0; font-weight: 600; }
        .usage { font-size: 0.85rem; color: #e67e22; background: #fff5eb; padding: 8px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #e67e22; }
        .example { font-size: 0.95rem; color: #444; font-weight: 500; line-height: 1.6; white-space: pre-wrap; margin-bottom: 15px; }
        .tip-box { background: #fff9c4; padding: 10px; border-radius: 8px; font-size: 0.85rem; color: #555; border-left: 4px solid #fbc02d; }
        .nav-main { margin-top: 25px; display: flex; gap: 10px; width: 100%; }
        button { padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1; }
        .btn-view { background: #546e7a; color: white; }
        .btn-next { background: var(--primary); color: white; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .nav-sub { margin-top: 20px; display: flex; gap: 20px; justify-content: center; }
        .nav-sub a { text-decoration: none; color: #888; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .nav-sub a:hover { color: var(--primary); }
        .status { margin-top: 15px; font-size: 0.9rem; color: #999; text-align: center; }
    </style>
</head>
<body>
    <h1 id="study-title">학습 페이지</h1>
    <div class="container">
        <div class="card">
            <div id="question" class="question">데이터 로딩 중...</div>
            <div id="answer" class="answer">
                <div id="reading" class="reading"></div>
                <div id="meaning" class="meaning"></div>
                <div id="usage" class="usage"></div>
                <div id="example" class="example"></div>
                <div id="tip" class="tip-box"></div>
            </div>
        </div>
        <div class="nav-main">
            <button class="btn-view" onclick="toggleAnswer()">내용 보기</button>
            <button class="btn-next" onclick="nextCard()">다음 카드</button>
        </div>
        <div class="nav-sub">
            <a onclick="prevCard()">이전</a>
            <a onclick="goToFirst()">처음</a>
            <a href="index.html">목록</a>
        </div>
        <div class="status"><span id="current">0</span> / <span id="total">0</span></div>
    </div>

    <script>
        let words = [];
        let currentIndex = 0;
        const urlParams = new URLSearchParams(window.location.search);
        const dataId = urlParams.get('id') || '1'; // 기본값 1.json

        // JSON 데이터 불러오기
        async function loadData() {
            try {
              const seasonId = urlParams.get('s') || '01'; // 시즌 번호 가져오기
              const response = await fetch(`./data/season${seasonId}/${dataId}.json`);
                if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                words = await response.json();
                init();
            } catch (error) {
                document.getElementById('question').innerText = "❌ 데이터를 불러올 수 없습니다.";
                console.error(error);
            }
        }

        function init() {
            document.getElementById('study-title').innerText = `${dataId}번 학습 세트`;
            const savedIndex = localStorage.getItem(`study_idx_${dataId}`);
            const hash = window.location.hash.replace('#card', '');

            if (hash && !isNaN(hash)) currentIndex = parseInt(hash) - 1;
            else if (savedIndex) currentIndex = parseInt(savedIndex);

            document.getElementById('total').innerText = words.length;
            updateCard();
        }

        function updateCard() {
            if (words.length === 0) return;
            const word = words[currentIndex];
            document.getElementById('question').innerText = word.q;
            document.getElementById('reading').innerText = word.r;
            document.getElementById('meaning').innerText = word.m;
            document.getElementById('usage').innerText = "해설: " + word.u;
            document.getElementById('example').innerText = word.e;
            document.getElementById('tip').innerHTML = "<strong>💡 Tip:</strong> " + word.tip;

            document.getElementById('answer').style.display = 'none';
            document.getElementById('current').innerText = currentIndex + 1;

            localStorage.setItem(`study_idx_${dataId}`, currentIndex);
            window.location.hash = `card${currentIndex + 1}`;
        }

        function toggleAnswer() {
            const ans = document.getElementById('answer');
            ans.style.display = (ans.style.display === 'none') ? 'block' : 'none';
        }

        function nextCard() { if (currentIndex < words.length - 1) { currentIndex++; updateCard(); } }
        function prevCard() { if (currentIndex > 0) { currentIndex--; updateCard(); } }
        function goToFirst() { currentIndex = 0; updateCard(); }

        window.onload = loadData;
    </script>
</body>
</html>
