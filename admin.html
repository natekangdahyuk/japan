<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 - 스마트 관리자 v1.6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2d3436; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Noto Sans KR', 'BIZ UDGothic', system-ui, sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        .control-bar { display: flex; gap: 15px; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; flex-wrap: wrap; }
        .control-bar select, .search-input { padding: 8px; border-radius: 4px; border: 1px solid #ddd; font-family: inherit; }
        .search-input { min-width: 250px; flex-grow: 1; border: 2px solid #e2e8f0; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; color: #666; font-weight: bold; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        
        .word-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .word-row-view { display: grid; grid-template-columns: 40px 1fr 1fr 1fr 120px; gap: 15px; align-items: start; }
        
        /* 수정 모드 레이아웃: 2줄 구성 */
        .mode-edit { background: #fffcf9; padding: 20px; border: 2px solid var(--accent); border-radius: 8px; margin: 10px 0; }
        .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        
        .edit-field { display: flex; flex-direction: column; }
        .edit-label { font-weight: bold; margin-bottom: 6px; color: var(--accent); font-size: 0.85rem; }
        .edit-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; }
        .edit-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(230, 126, 34, 0.1); }
        .edit-textarea { min-height: 100px; resize: vertical; }

        .tag-badge { background: #edf2f7; color: #4a5568; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-right: 5px; }
        .unit-badge { display: inline-block; padding: 2px 8px; background: #fff3e0; color: #e65100; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
        
        .btn-group { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-edit { background: #edf2f7; color: #4a5568; font-size: 0.8rem; }
        .btn-save { background: var(--accent); color: white; }
        .btn-cancel { background: #e2e8f0; color: #4a5568; }
        
        .view-text { white-space: pre-wrap; color: #333; font-size: 0.9rem; line-height: 1.5; }
        .status-msg { font-size: 0.85rem; color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="control-bar">
            <h1 style="font-size: 1.1rem; margin:0;">🇯🇵 스마트 관리 v1.6</h1>
            <select id="select-season" onchange="updateSetList()">
                <option value="s01">Season 01</option>
                <option value="s02">Season 02</option>
                <option value="s03">Season 03</option>
            </select>
            <select id="select-set" onchange="loadData()">
                <option value="">세트 선택</option>
            </select>
            <input type="text" id="tag-search" class="search-input" placeholder="태그 검색..." onkeyup="filterByTag()">
            <div id="status" class="status-msg">데이터를 선택하세요.</div>
        </div>

        <div id="word-list-container">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxhDRXkY5Li5rXItmQpMhxEYRKsyZJHoo",
            authDomain: "japanese-fd10c.firebaseapp.com",
            projectId: "japanese-fd10c",
            storageBucket: "japanese-fd10c.firebasestorage.app",
            messagingSenderId: "636416095711",
            appAppId: "1:636416095711:web:d9b5473a87f7dbd6c3c06a",
            databaseURL: "https://japanese-fd10c-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateSetList() {
            const sId = document.getElementById('select-season').value;
            const setSelect = document.getElementById('select-set');
            db.ref("seasons/" + sId).once('value', (snapshot) => {
                setSelect.innerHTML = '<option value="">세트 선택</option>';
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).sort().forEach(setKey => {
                        const option = document.createElement('option');
                        option.value = setKey;
                        option.innerText = "Set " + setKey;
                        setSelect.appendChild(option);
                    });
                }
            });
        }

        function loadData() {
            const sId = document.getElementById('select-season').value;
            const setId = document.getElementById('select-set').value;
            if (!setId) return;

            db.ref("seasons/" + sId + "/" + setId).on('value', (snapshot) => {
                const words = snapshot.val();
                const container = document.getElementById('word-list-container');
                container.innerHTML = "";
                if (!words) return;

                words.forEach((word, index) => {
                    const item = document.createElement('div');
                    item.className = "word-item";
                    item.id = "item-" + index;
                    item.setAttribute('data-tags', (word.tag || '').toLowerCase());
                    
                    const tagsHtml = (word.tag || '').split(',').filter(t => t.trim()).map(t => `<span class="tag-badge">${t.trim()}</span>`).join('');

                    item.innerHTML = `
                        <div class="mode-view word-row-view">
                            <div style="font-weight:bold; color:#999;">${index + 1}</div>
                            <div>
                                <div style="font-size:1.1rem; font-weight:bold;">${word.q}</div>
                                <div style="color:#666; font-size:0.9rem;">${word.r}</div>
                            </div>
                            <div>
                                <span class="unit-badge">${word.u || '미지정'}</span>
                                <div style="margin-top:5px; font-weight:600;">${word.m}</div>
                            </div>
                            <div class="view-text" style="font-size:0.85rem; color:#777;">${word.tag ? '🏷️ ' + word.tag : ''}</div>
                            <div style="text-align:right;"><button class="btn-edit" onclick="toggleEdit(${index}, true)">수정</button></div>
                        </div>

                        <div class="mode-edit" style="display:none;">
                            <div class="edit-row">
                                <div class="edit-field"><label class="edit-label">첫째줄: 질문(Q)</label><input type="text" class="edit-input edit-q" value="${word.q}"></div>
                                <div class="edit-field"><label class="edit-label">첫째줄: 읽기(R)</label><input type="text" class="edit-input edit-r" value="${word.r}"></div>
                            </div>
                            <div class="edit-row">
                                <div class="edit-field"><label class="edit-label">둘째줄: 의미(M)</label><input type="text" class="edit-input edit-m" value="${word.m}"></div>
                                <div class="edit-field"><label class="edit-label">둘째줄: 단위(U)</label><input type="text" class="edit-input edit-u" value="${word.u || ''}"></div>
                            </div>
                            <div class="edit-field" style="margin-bottom:15px;"><label class="edit-label">예문(E)</label><textarea class="edit-input edit-textarea edit-e">${word.e || ''}</textarea></div>
                            <div class="edit-field" style="margin-bottom:15px;"><label class="edit-label">Tip</label><textarea class="edit-input edit-textarea edit-tip">${word.tip || ''}</textarea></div>
                            <div class="edit-field"><label class="edit-label">태그 (쉼표 구분)</label><input type="text" class="edit-input edit-tag" value="${word.tag || ''}"></div>
                            
                            <div class="btn-group">
                                <button class="btn-save" onclick="saveData(${index})">변경 내용 저장</button>
                                <button class="btn-cancel" onclick="toggleEdit(${index}, false)">취소</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(item);
                });
                document.getElementById('status').innerText = "로드 완료: " + words.length + "건";
            });
        }

        function filterByTag() {
            const query = document.getElementById('tag-search').value.toLowerCase();
            document.querySelectorAll('.word-item').forEach(item => {
                const tags = item.getAttribute('data-tags');
                item.style.display = tags.includes(query) ? '' : 'none';
            });
        }

        function toggleEdit(index, isEdit) {
            const item = document.getElementById("item-" + index);
            item.querySelector('.mode-view').style.display = isEdit ? 'none' : 'grid';
            item.querySelector('.mode-edit').style.display = isEdit ? 'block' : 'none';
        }

        function saveData(index) {
            const sId = document.getElementById('select-season').value;
            const setId = document.getElementById('select-set').value;
            const item = document.getElementById("item-" + index);
            
            const updatedData = {
                q: item.querySelector('.edit-q').value,
                r: item.querySelector('.edit-r').value,
                u: item.querySelector('.edit-u').value,
                m: item.querySelector('.edit-m').value,
                e: item.querySelector('.edit-e').value,
                tip: item.querySelector('.edit-tip').value,
                tag: item.querySelector('.edit-tag').value
            };

            db.ref("seasons/" + sId + "/" + setId + "/" + index).update(updatedData).then(() => {
                toggleEdit(index, false);
            }).catch(err => alert("저장 실패: " + err.message));
        }

        window.onload = updateSetList;
    </script>
</body>
</html>
