<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 - 스마트 관리자 v1.5 (Tag & Unit)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2d3436; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Noto Sans KR', 'BIZ UDGothic', system-ui, sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; box-sizing: border-box; }
        
        .control-bar { display: flex; gap: 15px; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; flex-wrap: wrap; }
        .control-bar select, .search-input { padding: 8px; border-radius: 4px; border: 1px solid #ddd; font-family: inherit; min-width: 120px; }
        .search-input { min-width: 250px; flex-grow: 1; border: 2px solid #e2e8f0; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.85rem; vertical-align: top; }
        th { background: #f8f9fa; color: #666; font-weight: bold; }
        
        .editing-row { background: #fff !important; }
        .hidden-row { display: none !important; }
        
        .edit-input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }
        .edit-input:focus { border-color: var(--accent); outline: none; }
        .edit-line { min-height: 120px; resize: vertical; line-height: 1.5; }

        .word-row-view {
            display: grid;
            width: 100%;
            grid-template-columns: 2.5rem 1fr 0.8fr 1fr 1.5fr 1.5fr 0.8fr 5.5rem;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            align-items: start;
        }
        
        .tag-badge { background: #edf2f7; color: #4a5568; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; margin-right: 4px; display: inline-block; margin-bottom: 4px; }
        .unit-badge { color: var(--accent); font-weight: bold; font-size: 0.75rem; }

        .edit-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-edit { background: #edf2f7; color: #4a5568; }
        .btn-save { background: var(--accent); color: white; padding: 10px 20px; }
        .btn-cancel { background: #e2e8f0; color: #4a5568; }
        
        .view-text { white-space: pre-wrap; overflow-wrap: anywhere; color: #444; }
        .status-msg { font-size: 0.85rem; color: #e67e22; font-weight: bold; }
        .edit-label { font-weight: bold; margin-bottom: 5px; color: var(--accent); display: block; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="control-bar" id="control-bar">
            <h1 style="font-size: 1.1rem; margin:0;">🇯🇵 스마트 관리 v1.5</h1>
            
            <select id="select-season" onchange="updateSetList()">
                <option value="s01">Season 01</option>
                <option value="s02">Season 02</option>
                <option value="s03">Season 03</option>
            </select>

            <select id="select-set" onchange="loadData()">
                <option value="">세트 선택</option>
            </select>

            <input type="text" id="tag-search" class="search-input" placeholder="태그 검색 (예: 동사, 일상...)" onkeyup="filterByTag()">

            <div id="status" class="status-msg">시즌을 선택하세요.</div>
        </div>

        <table id="word-table">
            <thead>
                <tr>
                    <th style="width: 100%">데이터 리스트 (순서: # | Q/R | U | M | E | Tip | Tags | 관리)</th>
                </tr>
            </thead>
            <tbody id="word-list"></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxhDRXkY5Li5rXItmQpMhxEYRKsyZJHoo",
            authDomain: "japanese-fd10c.firebaseapp.com",
            projectId: "japanese-fd10c",
            storageBucket: "japanese-fd10c.firebasestorage.app",
            messagingSenderId: "636416095711",
            appId: "1:636416095711:web:d9b5473a87f7dbd6c3c06a",
            databaseURL: "https://japanese-fd10c-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateSetList() {
            const sId = document.getElementById('select-season').value;
            const setSelect = document.getElementById('select-set');
            db.ref("seasons/" + sId).once('value', (snapshot) => {
                setSelect.innerHTML = '<option value="">세트 선택</option>';
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).sort().forEach(setKey => {
                        const option = document.createElement('option');
                        option.value = setKey;
                        option.innerText = "Set " + setKey;
                        setSelect.appendChild(option);
                    });
                }
            });
        }

        function loadData() {
            const sId = document.getElementById('select-season').value;
            const setId = document.getElementById('select-set').value;
            if (!setId) return;

            const path = "seasons/" + sId + "/" + setId;
            db.ref(path).on('value', (snapshot) => {
                const words = snapshot.val();
                const listBody = document.getElementById('word-list');
                listBody.innerHTML = "";
                if (!words) return;

                words.forEach((word, index) => {
                    const row = document.createElement('tr');
                    row.id = "row-" + index;
                    row.setAttribute('data-tags', (word.tag || '').toLowerCase());
                    
                    const tagsHtml = (word.tag || '').split(',').filter(t => t.trim()).map(t => `<span class="tag-badge">${t.trim()}</span>`).join('');

                    row.innerHTML = `
                        <td style="padding: 0;">
                            <div class="mode-view word-row-view">
                                <div>${index + 1}</div>
                                <div><b>${word.q}</b><br><small style="color:#888">${word.r}</small></div>
                                <div class="unit-badge">${word.u || '-'}</div>
                                <div class="view-text">${word.m}</div>
                                <div class="view-text" style="font-size:0.8rem">${word.e || ''}</div>
                                <div class="view-text" style="font-size:0.8rem">${word.tip || ''}</div>
                                <div>${tagsHtml}</div>
                                <div><button class="btn-edit" onclick="toggleEdit(${index}, true)">수정</button></div>
                            </div>
                            <div class="mode-edit" style="display:none; padding:15px; border:2px solid var(--accent); border-radius:8px; margin:10px 0;">
                                <div class="edit-grid">
                                    <div class="edit-field"><label class="edit-label">질문(Q)</label><input type="text" class="edit-input edit-q" value="${word.q}"></div>
                                    <div class="edit-field"><label class="edit-label">읽기(R)</label><input type="text" class="edit-input edit-r" value="${word.r}"></div>
                                    <div class="edit-field"><label class="edit-label">단위(U)</label><input type="text" class="edit-input edit-u" value="${word.u || ''}"></div>
                                    <div class="edit-field"><label class="edit-label">의미(M)</label><input type="text" class="edit-input edit-m" value="${word.m}"></div>
                                </div>
                                <div class="edit-field" style="margin-bottom:10px;"><label class="edit-label">예문(E)</label><textarea class="edit-input edit-line edit-e">${word.e || ''}</textarea></div>
                                <div class="edit-field" style="margin-bottom:10px;"><label class="edit-label">Tip</label><textarea class="edit-input edit-line edit-tip">${word.tip || ''}</textarea></div>
                                <div class="edit-field" style="margin-bottom:15px;"><label class="edit-label">태그 (쉼표로 구분)</label><input type="text" class="edit-input edit-tag" value="${word.tag || ''}" placeholder="예: 동사, 일상, 중요"></div>
                                <div style="text-align:right;">
                                    <button class="btn-save" onclick="saveData(${index})">저장</button>
                                    <button class="btn-cancel" onclick="toggleEdit(${index}, false)">취소</button>
                                </div>
                            </div>
                        </td>
                    `;
                    listBody.appendChild(row);
                });
                document.getElementById('status').innerText = "데이터 로드 완료.";
            });
        }

        function filterByTag() {
            const query = document.getElementById('tag-search').value.toLowerCase();
            const rows = document.querySelectorAll('#word-list tr');
            rows.forEach(row => {
                const tags = row.getAttribute('data-tags');
                row.style.display = tags.includes(query) ? '' : 'none';
            });
        }

        function toggleEdit(index, isEdit) {
            const row = document.getElementById("row-" + index);
            row.querySelector('.mode-view').style.display = isEdit ? 'none' : 'grid';
            row.querySelector('.mode-edit').style.display = isEdit ? 'block' : 'none';
        }

        function saveData(index) {
            const sId = document.getElementById('select-season').value;
            const setId = document.getElementById('select-set').value;
            const row = document.getElementById("row-" + index);
            
            const updatedData = {
                q: row.querySelector('.edit-q').value,
                r: row.querySelector('.edit-r').value,
                u: row.querySelector('.edit-u').value,
                m: row.querySelector('.edit-m').value,
                e: row.querySelector('.edit-e').value,
                tip: row.querySelector('.edit-tip').value,
                tag: row.querySelector('.edit-tag').value
            };

            db.ref("seasons/" + sId + "/" + setId + "/" + index).update(updatedData).then(() => {
                toggleEdit(index, false);
            }).catch(err => alert("오류: " + err.message));
        }

        window.onload = updateSetList;
    </script>
</body>
</html>
