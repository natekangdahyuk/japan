<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 - 스마트 관리자 v1.3</title>    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { --primary: #2d3436; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .control-bar { display: flex; gap: 15px; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        .control-bar select { padding: 8px; border-radius: 4px; border: 1px solid #ddd; font-family: inherit; min-width: 120px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.85rem; vertical-align: top; }
        th { background: #f8f9fa; color: #666; }
        
        .edit-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 0.85rem; }
        .edit-area { width: 100%; min-height: 80px; resize: vertical; }
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        button { padding: 6px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.75rem; }
        .btn-edit { background: #edf2f7; color: #4a5568; }
        .btn-save { background: var(--accent); color: white; display: none; }
        .btn-cancel { background: #e2e8f0; color: #4a5568; display: none; }
        
        .view-text { white-space: pre-wrap; word-break: break-all; color: #444; }
        .status-msg { font-size: 0.85rem; color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="control-bar">
            <h1 style="font-size: 1.1rem; margin:0;">🇯🇵 관리 v1.3</h1>
            
            <select id="select-season" onchange="updateSetList()">
                <option value="s01">Season 01</option>
                <option value="s02">Season 02</option>
                <option value="s03">Season 03</option>
            </select>

            <select id="select-set" onchange="loadData()">
                <option value="">세트 선택</option>
            </select>

            <div id="status" class="status-msg">시즌을 선택하세요.</div>
        </div>

        <table id="word-table">
            <thead>
                <tr>
                    <th style="width: 4%">#</th>
                    <th style="width: 12%">한자/읽기</th>
                    <th style="width: 15%">의미(M)</th>
                    <th style="width: 25%">예문(E)</th>
                    <th style="width: 34%">Tip</th>
                    <th style="width: 10%">관리</th>
                </tr>
            </thead>
            <tbody id="word-list"></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxhDRXkY5Li5rXItmQpMhxEYRKsyZJHoo",
            authDomain: "japanese-fd10c.firebaseapp.com",
            projectId: "japanese-fd10c",
            storageBucket: "japanese-fd10c.firebasestorage.app",
            messagingSenderId: "636416095711",
            appId: "1:636416095711:web:d9b5473a87f7dbd6c3c06a",
            databaseURL: "https://japanese-fd10c-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🔥 1. 시즌이 바뀌면 해당 시즌에 존재하는 세트(001, 011 등) 목록을 가져옴
        function updateSetList() {
            const sId = document.getElementById('select-season').value;
            const setSelect = document.getElementById('select-set');
            const status = document.getElementById('status');

            status.innerText = "세트 목록 확인 중...";
            setSelect.innerHTML = '<option value="">불러오는 중...</option>';

            // DB에서 해당 시즌 노드의 키(Key)들만 가져오기
            db.ref(`seasons/${sId}`).once('value', (snapshot) => {
                setSelect.innerHTML = '<option value="">세트 선택</option>';
                const data = snapshot.val();

                if (data) {
                    Object.keys(data).sort().forEach(setKey => {
                        const option = document.createElement('option');
                        option.value = setKey;
                        option.innerText = `Set ${setKey}`;
                        setSelect.appendChild(option);
                    });
                    status.innerText = "세트를 선택해주세요.";
                } else {
                    status.innerText = "데이터가 없는 시즌입니다.";
                }
            });
        }

        // 2. 선택된 세트의 단어 데이터 로드
        function loadData() {
            const sId = document.getElementById('select-season').value;
            const setId = document.getElementById('select-set').value;
            if (!setId) return;

            const path = `seasons/${sId}/${setId}`;
            const status = document.getElementById('status');
            status.innerText = "단어 로딩 중...";

            db.ref(path).off();
            db.ref(path).on('value', (snapshot) => {
                const words = snapshot.val();
                const listBody = document.getElementById('word-list');
                listBody.innerHTML = "";

                if (!words) {
                    status.innerText = "데이터가 비어있습니다.";
                    return;
                }

                status.innerText = `${path} 관리 중`;
                
                words.forEach((word, index) => {
                    const row = `
                        <tr id="row-${index}">
                            <td>${index + 1}</td>
                            <td>
                                <div class="col-q"><span class="view">${word.q}</span><input type="text" class="edit-input edit" value="${word.q}" style="display:none;"></div>
                                <div class="col-r" style="margin-top:5px; color:#888;"><span class="view">${word.r}</span><input type="text" class="edit-input edit" value="${word.r}" style="display:none;"></div>
                            </td>
                            <td class="col-m"><span class="view view-text">${word.m}</span><input type="text" class="edit-input edit" value="${word.m}" style="display:none;"></td>
                            <td class="col-e"><span class="view view-text">${word.e || ''}</span><textarea class="edit-input edit edit-area" style="display:none;">${word.e || ''}</textarea></td>
                            <td class="col-tip"><span class="view view-text">${word.tip || ''}</span><textarea class="edit-input edit edit-area" style="display:none;">${word.tip || ''}</textarea></td>
                            <td>
                                <div class="btn-group">
                                    <button class="btn-edit view" onclick="toggleEdit(${index}, true)">수정</button>
                                    <button class="btn-save edit" onclick="saveData(${index})" style="display:none;">저장</button>
                                    <button class="btn-cancel edit" onclick="toggleEdit(${index}, false)" style="display:none;">취소</button>
                                </div>
                            </td>
                        </tr>
                    `;
                    listBody.innerHTML += row;
                });
            });
        }

        function toggleEdit(index, isEdit) {
            const row = document.getElementById(`row-${index}`);
            row.querySelectorAll('.view').forEach(el => el.style.display = isEdit ? 'none' : 'block');
            row.querySelectorAll('.edit').forEach(el => el.style.display = isEdit ? 'block' : 'none');
        }

        function saveData(index) {
            const sId = document.getElementById('select-season').value;
            const setId = document.getElementById('select-set').value;
            const path = `seasons/${sId}/${setId}/${index}`;

            const row = document.getElementById(`row-${index}`);
            const updatedData = {
                q: row.querySelector('.col-q input').value,
                r: row.querySelector('.col-r input').value,
                m: row.querySelector('.col-m input').value,
                e: row.querySelector('.col-e textarea').value,
                tip: row.querySelector('.col-tip textarea').value
            };

            db.ref(path).update(updatedData).then(() => {
                alert("저장 성공!");
                toggleEdit(index, false);
            }).catch(err => alert("오류: " + err.message));
        }

        // 초기 실행: 첫 시즌의 세트 목록 불러오기
        window.onload = updateSetList;
    </script>
</body>
</html>
