    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;       /* 전체 딥 블랙 배경 */
            --card-bg: #1e1e1e;       /* 섹션 박스 배경 (약간 밝은 그레이) */
            --border-color: #333333;  /* 박스 경계선 */
            --text-main: #e0e0e0;     /* 기본 글자색 */
            --text-muted: #888888;    /* 흐린 글자색 */
            --s1-point: #4CAF50;      /* 시즌 1 포인트 (초록) */
            --s2-point: #1976d2;      /* 시즌 2 포인트 (파랑) */
            --s3-point: #8e24aa;      /* 시즌 3 포인트 (보라) */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'BIZ UDGothic', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 헤더 바 */
        .header {
            width: 100%;
            max-width: 450px;
            padding: 10px 0;
            text-align: left;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        /* 시즌 섹션 공통 */
        .season-section {
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color); /* 외곽선으로 경계 명확화 */
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* 그림자로 공중 부양 효과 */
            box-sizing: border-box;
        }

        .season-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .season-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .season-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 버튼 그리드 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-num {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-num:active { transform: scale(0.9); }

        /* 시즌 1 스타일 */
        .s1 .season-title { color: var(--s1-point); }
        .s1 .btn-num { background-color: #2e7d32; }
        .s1 .btn-num:hover { background-color: var(--s1-point); }

        /* 시즌 2 스타일 */
        .s2 .season-title { color: var(--s2-point); }
        .s2 .btn-num { background-color: #1565c0; }
        .s2 .btn-num:hover { background-color: var(--s2-point); }

        /* 시즌 3 스타일 */
        .s3 .season-title { color: var(--s3-point); }
        .s3 .btn-num { background-color: #6a1b9a; }
        .s3 .btn-num:hover { background-color: var(--s3-point); }

        /* 랜덤 버튼 스타일 */
        .btn-random {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .s1 .btn-random { background-color: #1b5e20; }
        .s1 .btn-random:hover { background-color: #2e7d32; }

        .s2 .btn-random { background-color: #0d47a1; }
        .s2 .btn-random:hover { background-color: #1565c0; }

        .s3 .btn-random { background-color: #4a148c; }
        .s3 .btn-random:hover { background-color: #6a1b9a; }

        /* 하단 푸터 */
        .footer {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
