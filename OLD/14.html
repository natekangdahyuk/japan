<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 14</title>
    <style>
        :root { --primary: #1976d2; --bg: #f0f4f8; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #333; margin-bottom: 10px; font-size: 1.5rem; text-align: center; }
        .container { width: 100%; max-width: 400px; }
        /* 카드 클릭 이벤트 제거 및 커서 변경 */
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; transition: transform 0.3s; min-height: 350px; display: flex; flex-direction: column; justify-content: center; position: relative; cursor: default; }
        .category { position: absolute; top: 15px; left: 15px; font-size: 0.75rem; color: var(--primary); font-weight: bold; border: 1px solid #e3f2fd; padding: 2px 8px; border-radius: 20px; background: #e3f2fd; }
        .question { font-size: 2rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; word-break: keep-all; }
        .answer { display: none; border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; text-align: left; }
        .reading { font-size: 1.2rem; color: #666; font-weight: bold; }
        .meaning { font-size: 1.1rem; color: #333; margin: 10px 0; font-weight: 600; }
        .usage { font-size: 0.85rem; color: #1976d2; background: #e3f2fd; padding: 8px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #1976d2; }
        .example { font-size: 0.95rem; color: #444; font-weight: 500; line-height: 1.6; white-space: pre-wrap; margin-bottom: 15px; }
        .tip-box { background: #fff9c4; padding: 10px; border-radius: 8px; font-size: 0.85rem; color: #555; border-left: 4px solid #fbc02d; }
        
        /* 메인 버튼 스타일 */
        .nav-main { margin-top: 25px; display: flex; gap: 10px; width: 100%; }
        button { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s; flex: 1; }
        .btn-view { background: #546e7a; color: white; }
        .btn-next { background: var(--primary); color: white; }
        button:active { transform: scale(0.98); opacity: 0.9; }

        /* 하단 보조 링크 스타일 */
        .nav-sub { margin-top: 20px; display: flex; gap: 20px; justify-content: center; }
        .nav-sub a { text-decoration: none; color: #888; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .nav-sub a:hover { color: var(--primary); }

        .status { margin-top: 15px; font-size: 0.9rem; color: #999; text-align: center; }
    </style>
</head>
<body>
    <h1>📘 학습 14</h1>
    <div class="container">
        <div class="card">
            <div id="category" class="category">시즌 2</div>
            <div id="question" class="question"></div> 
            <div id="answer" class="answer">
                <div id="reading" class="reading"></div>
                <div id="meaning" class="meaning"></div>
                <div id="usage" class="usage"></div>
                <div id="example" class="example"></div>
                <div id="tip" class="tip-box"></div>
            </div>
        </div>

        <div class="nav-main">
            <button class="btn-view" onclick="toggleAnswer()">내용 보기</button>
            <button class="btn-next" onclick="nextCard()">다음 카드</button>
        </div>

        <div class="nav-sub">
            <a onclick="prevCard()">이전</a>
            <a onclick="goToFirst()">처음</a>
            <a href="index.html">목록</a>
        </div>

        <div class="status"><span id="current">1</span> / <span id="total">25</span></div>
    </div>

    <script>
        const words = [
            { q: `引き出し`, r: `ひきだし`, m: `서랍`, u: `n. 명사`, e: `칼은 저 서랍 안에 있습니다.`, tip: `히키(당기다) + 다시(내다) = 당겨서 내는 것, 즉 '서랍'이야!` },
            { q: `包丁`, r: `ほうちょう`, m: `칼, 식칼`, u: `n. 명사`, e: `그 칼 나한테 넘겨.`, tip: `부엌에서 쓰는 식칼을 주로 의미해. '호-쵸-' 발음 주의!` },
            { q: `怖い`, r: `こわい`, m: `무섭다`, u: `adj. 형용사`, e: `귀신의 집은 전혀 무섭지 않았습니다.`, tip: `감정적으로 무서울 때 쓰는 단어. '코와이'!` },
            { q: `幽霊屋敷`, r: `ゆうれいやしき`, m: `귀신의 집`, u: `n. 명사`, e: `유령 저택(귀신의 집)은 무서워요.`, tip: `유령(유-레이) + 저택(야시키)이 합쳐진 말이야.` },
            { q: `幽霊`, r: `ゆうれい`, m: `유령`, u: `n. 명사`, e: `이 방에 유령이 나온다나 봐.`, tip: `다리가 없는 전형적인 유령을 말할 때 주로 써.` },
            { q: `お化け`, r: `おばけ`, m: `귀신, 요괴`, u: `n. 명사`, e: `귀신이 나타났다! 도망쳐!`, tip: `모습이 변하는 것(바케루)에서 유래한 단어야.` },
            { q: `小説`, r: `しょうせつ`, m: `소설`, u: `n. 명사`, e: `네가 쓴 소설은 정말 지루하구나.`, tip: `말(言)로 설명(説)하는 작은(小) 이야기.` },
            { q: `結構`, r: `けっこう`, m: `제법, 꽤`, u: `adv. 부사`, e: `제법 근력 운동을 합니다.`, tip: `충분하다는 뜻도 있지만, 여기선 '생각보다 꽤'라는 뜻!` },
            { q: `筋トレ`, r: `きんとれ`, m: `근력 운동`, u: `n. 명사`, e: `매일 근력 운동을 하고 있어요.`, tip: `근육(킨니쿠) + 트레이닝(토레-닝구)의 줄임말.` },
            { q: `結婚式`, r: `けっこんしき`, m: `결혼식`, u: `n. 명사`, e: `네 결혼식은 정말 지루했어.`, tip: `결혼 + 식(의식). 일본 결혼식은 축의금이 비싸기로 유명하지.` },
            { q: `部활`, r: `ぶかつ`, m: `동아리 활동`, u: `n. 명사`, e: `토요일은 동아리 시합이야.`, tip: `부 활동(부카츠도-)의 줄임말. 일본 학교 생활의 꽃!` },
            { q: `試合`, r: `しあい`, m: `시합`, u: `n. 명사`, e: `그런 시합, 절대로 질 거야.`, tip: `서로(合) 시험(試)해 본다는 뜻에서 유래.` },
            { q: `～に しようか`, r: `～に しようか`, m: `~로 할까?`, u: `v. 제안`, e: `시합은 언제로 할까?`, tip: `제안할 때 쓰는 표현이야. 선택지를 좁힐 때 굿!` },
            { q: `なら、日曜日に`, r: `なら、日曜日に`, m: `그럼 일요일에`, u: `문장`, e: `그럼 일요일에 하자. 절대 지지 마.`, tip: `조건의 '나라(~라면/그럼)'와 요일을 합친 문장.` },
            { q: `支度しないと`, r: `したくしないと`, m: `준비해야 해`, u: `v. 의무`, e: `월요일에는 전부 준비해야 해.`, tip: `시타쿠(支度)는 외출이나 식사 등 '당장 필요한 채비'를 뜻해!` },
            { q: `頑張れば`, r: `がんばれば`, m: `힘내면 (가정)`, u: `v. 가정형`, e: `월요일에 힘내면 괜찮겠죠.`, tip: `간바루(힘내다)의 에단+바 형태. '간바레바'!` },
            { q: `大雨`, r: `おおあめ`, m: `폭우`, u: `n. 명사`, e: `폭우로 비행기 출발이 늦어졌어.`, tip: `큰(大) 비(雨). 일본은 태풍 때 오오아메 경보가 자주 떠.` },
            { q: `出発が 遅れた`, r: `しゅっぱつがおくれた`, m: `출발이 늦어졌다`, u: `문장`, e: `비행기 출발이 지연됐어. 지금 난리야.`, tip: `오쿠레루(늦다)의 과거형. 비행기나 기차에 자주 쓰여.` },
            { q: `降らなきゃいいね`, r: `ふらなきゃいいね`, m: `안 오면 좋겠네`, u: `문장`, e: `비가 안 오면 좋겠다.`, tip: `후라나이(안 내리다) + 나캬(가정) + 이이네(좋겠네).` },
            { q: `格好`, r: `かっこう `, m: `모양, 모습, 옷차림`, u: `n. 명사`, e: `어떤 차림으로 가나요?`, tip: `발음 팁: '갓 고운 옷차림'! 겉모습이나 폼을 뜻해.` },
            { q: `女の人はどんな格好で行きますか`, r: `おんなの ひとはどんな かっこうで いきますか`, m: `그 여자는 어떤 차림으로 가나요?`, u: `문장`, e: `결혼식에 어떤 옷을 입고 가나요?`, tip: `복장이나 스타일을 물어볼 때 쓰는 완벽한 문장.` },
            { q: `着ないの？`, r: `きないの?`, m: `안 입어?`, u: `v. 부정질문`, e: `나랑 커플티 안 입을 거야?`, tip: `키루(입다)의 부정형. 상의를 입을 때 쓰는 동사야.` },
            { q: `流行している`, r: `りゅうこうしている`, m: `유행하고 있다`, u: `v. 진행형`, e: `이 디자인, 지금 아주 유행하고 있어.`, tip: `류우코우(유행). 트렌드를 따를 때 쓰는 필수 단어!` },
            { q: `スケジュール、何ですが…`, r: `スケジュール, なんですが…...`, m: `일정 말입니다만...`, u: `비즈니스 회화`, e: `오늘 일정 말입니다만, 확인 부탁드려요.`, tip: `문장을 흐리며 상대의 반응을 살피는 고단수 비즈니스 표현!` },
            { q: `ことに なりました`, r: `ことに なりました`, m: `~하게 되었습니다`, u: `문법`, e: `손님이 오시게 되었습니다.`, tip: `자신의 의지가 아닌 상황의 결정에 대해 보고할 때 필수!` }
        ];

        let currentIndex = 0;
        window.onload = function() {
            const saved = localStorage.getItem('lastCardIndexSeason2');
            const hash = window.location.hash;
            if (hash && hash.startsWith('#card')) {
                currentIndex = parseInt(hash.replace('#card', '')) - 1;
            } else if (saved) {
                currentIndex = parseInt(saved);
            }
            document.getElementById('total').innerText = words.length;
            updateCard();
        };

        function updateCard() {
            const word = words[currentIndex];
            document.getElementById('question').innerText = word.q;
            document.getElementById('reading').innerText = word.r;
            document.getElementById('meaning').innerText = word.m;
            document.getElementById('usage').innerText = "분류: " + word.u;
            document.getElementById('example').innerText = word.e;
            document.getElementById('tip').innerHTML = "<strong>💡 Tip:</strong> " + word.tip;
            document.getElementById('answer').style.display = 'none';
            document.getElementById('current').innerText = currentIndex + 1;
            
            localStorage.setItem('lastCardIndexSeason2', currentIndex);
            history.replaceState(null, null, "#card" + (currentIndex + 1));
        }

        function toggleAnswer() {
            const ans = document.getElementById('answer');
            ans.style.display = (ans.style.display === 'block') ? 'none' : 'block';
        }

        function nextCard() { if (currentIndex < words.length - 1) { currentIndex++; updateCard(); } }
        function prevCard() { if (currentIndex > 0) { currentIndex--; updateCard(); } }
        function goToFirst() { currentIndex = 0; updateCard(); }
    </script>
</body>
</html>
