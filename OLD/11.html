        .ex-kr { font-size: 0.9rem; color: #666; display: block; }

        .dahyeok-tip { border-left: 4px solid var(--highlight); padding-left: 10px; font-style: italic; color: var(--highlight); font-weight: bold; margin-bottom: 8px; display: block; }

        .nav-main { margin-top: 25px; display: flex; gap: 10px; width: 100%; }

        .btn-next { background: var(--accent); color: white; }

        .nav-sub { margin-top: 20px; display: flex; gap: 20px; justify-content: center; }
        .nav-sub a { text-decoration: none; color: #aaa; font-size: 0.9rem; font-weight: 500; cursor: pointer; }

</head>
