<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8번 학습 페이지 - 결정과 변화</title>
    <style>
        :root { --primary: #4A90E2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #333; margin-bottom: 10px; font-size: 1.5rem; text-align: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: transform 0.3s; min-height: 350px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .card:active { transform: scale(0.98); }
        .category { position: absolute; top: 15px; left: 15px; font-size: 0.75rem; color: #aaa; font-weight: bold; border: 1px solid #eee; padding: 2px 8px; border-radius: 20px; }
        .question { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .answer { display: none; border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; text-align: left; }
        .reading { font-size: 1.2rem; color: #666; font-weight: bold; }
        .meaning { font-size: 1.1rem; color: #333; margin: 10px 0; font-weight: 600; }
        .usage { font-size: 0.85rem; color: #e67e22; background: #fff5eb; padding: 8px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #e67e22; }
        .example { font-size: 0.95rem; color: #444; font-weight: 500; line-height: 1.6; }
        .nav { margin-top: 25px; display: flex; gap: 10px; width: 100%; justify-content: center; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .prev { background: #ccc; color: white; }
        .next { background: var(--primary); color: white; flex-grow: 1; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #999; text-align: center; }
        .back-home { margin-top: 25px; text-decoration: none; color: #888; font-size: 0.9rem; display: block; text-align: center; font-weight: 500; }
    </style>
</head>
<body>
    <h1>🎯 결정과 준비 (8번 학습 카드)</h1>
    <div class="container">
        <div class="card" onclick="toggleAnswer()">
            <div id="category" class="category">단어/문법</div>
            <div id="question" class="question"></div> 
            <div id="answer" class="answer">
                <div id="reading" class="reading"></div>
                <div id="meaning" class="meaning"></div>
                <div id="usage" class="usage"></div>
                <div id="example" class="example"></div>
            </div>
        </div>
        <div class="nav">
            <button class="prev" onclick="prevCard()">이전</button>
            <button class="next" onclick="nextCard()">다음 카드</button>
        </div>
        <div class="status"><span id="current">1</span> / <span id="total">12</span></div>
        <a href="index.html" class="back-home">🏠 목록으로 돌아가기</a>
    </div>

    <script>
        const words = [    
            { 
                q: "置く", r: "おく", m: "두다, 놓다", u: "1그룹 타동사", 
                e: `ここに 荷物を 置くことに しました。
                여기에 짐을 두기로 했습니다 (내 결정).` 
            },
            { 
                q: "靴", r: "くつ", m: "신발", u: "명사", 
                e: `新しい 靴を 買いたいです。
                새 신발을 사고 싶습니다.` 
            },
            { 
                q: "履く", r: "はく", m: "(신발 등을) 신다", u: "1그룹 타동사", 
                e: `毎日この靴を履くことになっています。
                매일 이 신발을 신기로 되어 있습니다 (규칙).` 
            },
            { 
                q: "脱ぐ", r: "ぬぐ", m: "벗다", u: "1그룹 타동사", 
                e: `

部屋(へや)に 入(はい)る 前(まえ)には、靴(くつ)を 脱(ぬ)がなければ なりません。
방에 들어가기 전에는 신발을 벗어야 합니다.

部屋に入る前に靴を脱ぎます。
                방에 들어가기 전에 신발을 벗습니다.` 
            },
            { 
                q: "助け", r: "たすけ", m: "도움, 구조", u: "명사", 
                e: `友達の助けが必要（ひつよう）です。
                친구의 도움이 필요합니다.` 
            },
            { 
                q: "看板", r: "かんばん", m: "간판", u: "명사", 
                e: `店の前に大きい 看板を置きました。
                가게 앞에 큰 간판을 두었습니다.` 
            },
            { 
                q: "数", r: "かず", m: "수, 개수", u: "명사", 
                e: `人の数が以前より増えました。
                사람 수가 예전보다 늘었습니다.` 
            },
            { 
                q: "体重", r: "たいじゅう", m: "체중", u: "명사", 
                e: `体重が 増えたので、ダイエットをすることにしました。
                체중이 늘어서 다이어트를 하기로 했습니다.` 
            },
            { 
                q: "心配", r: "しんぱい", m: "걱정", u: "명사 / する동사", 
                e: `テストの 内容が 心配です.
                시험 내용이 걱정입니다.` 
            },
            { 
                q: "準備", r: "じゅんび", m: "준비", u: "명사 / する동사", 
                e: `明日の 準備をするために、早く寝ます。
                내일 준비를 하기 위해 일찍 잡니다.` 
            },
            { 
                q: "疲れた", r: "つかれた", m: "지쳤다, 피곤했다", u: "동사 과거형", 
                e: `
                今日は とても 疲（つか）れました。
                오늘은 매우 피곤했습니다.
                昨日は 遅くまでお酒を飲んだので、疲れています。
                어제 늦게까지 술을 마셔서 피곤합니다.` 
            },
            { 
                q: "ことにする / なる", r: "문법 핵심", m: "결정 / 결정됨", u: "보통형 연결", 
                e: `
                하기로 고또니, 하려고 요우니 로 외운다. 하기고, 하료우
                동사 기본형 + ことにする = ~하기로 하다
                동사 ない형 + ことにする = ~하지 않기로 하다
                毎日日本語を勉強することにしました。
                매일 일본어를 공부하기로 했습니다.
                今日は早く寝ることにしました。
                오늘은 일찍 자기로 했습니다.
                夜はお菓子を食べないことにしました。
                밤에는 과자를 먹지 않기로 했습니다.
                ` 
            }
        ];

        let currentIndex = 0;
        window.onload = function() {
            const hash = window.location.hash;
            if (hash && hash.startsWith('#card')) {
                const index = parseInt(hash.replace('#card', '')) - 1;
                if (index >= 0 && index < words.length) { currentIndex = index; }
            }
            document.getElementById('total').innerText = words.length;
            updateCard();
        };

        function updateCard() {
            if (words.length === 0) return;
            const word = words[currentIndex];
            document.getElementById('question').innerText = word.q;
            document.getElementById('reading').innerText = word.r;
            document.getElementById('meaning').innerText = word.m;
            document.getElementById('usage').innerText = "해설: " + word.u;
            document.getElementById('example').innerHTML = word.e.replace(/\n/g, '<br>');
            document.getElementById('answer').style.display = 'none';
            document.getElementById('current').innerText = currentIndex + 1;
            document.getElementById('category').innerText = (currentIndex === 11) ? "핵심문법" : "단어학습";
            history.replaceState(null, null, "#card" + (currentIndex + 1));
        }

        function toggleAnswer() {
            const ans = document.getElementById('answer');
            ans.style.display = (ans.style.display === 'block') ? 'none' : 'block';
        }

        function nextCard() { currentIndex = (currentIndex + 1) % words.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + words.length) % words.length; updateCard(); }
    </script>
</body>
</html>
