<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2번 학습 페이지 - N4 단어장</title>
    <style>
        :root { --primary: #4A90E2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #333; margin-bottom: 10px; font-size: 1.5rem; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: transform 0.3s; min-height: 280px; display: flex; flex-direction: column; justify-content: center; }
        .card:active { transform: scale(0.98); }
        .question { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .answer { display: none; border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; text-align: left; }
        .reading { font-size: 1.2rem; color: #666; font-weight: bold; }
        .meaning { font-size: 1.1rem; color: #333; margin: 10px 0; }
        .usage { font-size: 0.9rem; color: #777; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .example { font-size: 0.95rem; color: var(--primary); font-weight: 500; line-height: 1.6; }
        .nav { margin-top: 25px; display: flex; gap: 10px; width: 100%; justify-content: center; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .prev { background: #ccc; color: white; }
        .next { background: var(--primary); color: white; flex-grow: 1; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #999; text-align: center; }
        .back-home { margin-top: 20px; text-decoration: none; color: #888; font-size: 0.9rem; display: block; text-align: center; }
    </style>
</head>
<body>

    <h1>🎴 오늘의 단어 카드 (N4)</h1>
    <div class="container">
        <div class="card" onclick="toggleAnswer()">
            <div id="question" class="question"></div> 
            <div id="answer" class="answer">
                <div id="reading" class="reading"></div>
                <div id="meaning" class="meaning"></div>
                <div id="usage" class="usage"></div>
                <div id="example" class="example"></div>
            </div>
        </div>

        <div class="nav">
            <button class="prev" onclick="prevCard()">이전</button>
            <button class="next" onclick="nextCard()">다음 카드</button>
        </div>
        <div class="status"><span id="current">1</span> / <span id="total">0</span></div>
        <a href="index.html" class="back-home">🏠 목록으로 돌아가기</a>
    </div>

    <script>
        const words = [    
            { 
                q: "倒れる", 
                r: "たおれる", 
                m: "넘어지다, 쓰러지다", 
                u: "동사 / 2형 자동사", 
                e: `台風(たいふう)で 家(いえ)가 倒れ(たおれ)ました。
태풍으로 집이 쓰러졌습니다.

[연관 팁]
1. 반대말: 立つ(たつ, 서다)
2. 타동사: 倒す(たおす, 쓰러뜨리다)
3. 수동형: 倒される(쓰러짐을 당하다)` 
            },
            { 
                q: "電気", 
                r: "でんき", 
                m: "전기, 불(전등)", 
                u: "명사 / 에너지 및 전등", 
                e: `寝(ね)る 前(まえ)に 電気(でんき)を 消し(けし)ます。
자기 전에 불을 끕니다.

[연관 팁]
1. 반대말: 電気をつける(불을 켜다)` 
            },
            { 
                q: "消す", 
                r: "けす", 
                m: "끄다, 지우다", 
                u: "동사 / 1형 타동사", 
                e: `黒板(こくばん)の 文字(もじ)を 消し(けし)て ください。
칠판의 글자를 지워 주세요.

[연관 팁]
1. 자동사 세트: 消える(きえる, 꺼지다)
2. 반대말: つける(켜다)` 
            },
            { 
                q: "忘れる", 
                r: "わすれる", 
                m: "잊다, 잊어버리다", 
                u: "동사 / 2형 자동사", 
                e: `傘(かさ)を 電車(でんしゃ)に 忘れ(わすれ)ました。
우산을 지하철에 두고 왔습니다.

[연관 팁]
1. 반대말: 覚える(おぼえる, 기억하다/외우다)
2. 희망형: 忘れたい(わすれたい, 잊고 싶다)` 
            },
            { 
                q: "便利だ", 
                r: "べん리다", 
                m: "편리하다", 
                u: "나형용사", 
                e: `駅(えき)の 近く(ちかく)は とても 便利(べんり)입니다.
역 근처는 매우 편리합니다.

[연관 팁]
1. 반대말: 不便だ(ふべんだ, 불편하다)` 
            },
            { 
                q: "増える", 
                r: "ふえる", 
                m: "늘다, 늘어나다", 
                u: "동사 / 2형 자동사", 
                e: `この 町(まち)は 人(ひと)が 増え(ふえ)て います。
이 마을은 사람이 늘어나고 있습니다.

[연관 팁]
1. 타동사 세트: 増やす(ふやす, 늘리다)
2. 반대말: 減る(へる, 줄다)` 
            },
            { 
                q: "以前", 
                r: "いぜん", 
                m: "이전, 전", 
                u: "명사 / 시간", 
                e: `以前(いぜん)、ここに 学校(がっこう)이 있었습니다.
이전에 여기에 학교가 있었습니다.

[연관 팁]
1. 유의어: 昔(むかし, 옛날) - 보다 객관적인 표현` 
            },
            { 
                q: "隣", 
                r: "となり", 
                m: "옆, 이웃", 
                u: "명사 / 위치", 
                e: `隣(となり)の 部屋(へ야)가 시끄럽습니다.
옆 방이 시끄럽습니다.

[연관 팁]
1. 비교: 横(よこ, 옆) - 보다 범위가 넓음` 
            },
            { 
                q: "出口", 
                r: "でぐち", 
                m: "출구", 
                u: "명사 / 통로", 
                e: `出口(でぐち)는 어디에 있습니까?
출구는 어디에 있습니까?

[연관 팁]
1. 반대말: 入口(いりぐち, 입구)` 
            },
            { 
                q: "真っ直ぐ", 
                r: "まっすぐ", 
                m: "똑바로, 곧장", 
                u: "부사 / 상태", 
                e: `この 道(みち)を まっすぐ 行っ(いっ)て ください.
이 길을 똑바로 가 주세요.

[연관 팁]
1. 유의어: ずっと (줄곧/훨씬)` 
            },
            { 
                q: "忘れてしまう", 
                r: "わすれてしまう", 
                m: "잊어버리고 말다", 
                u: "문형 / 완료/아쉬움", 
                e: `大事(だいじ)な 用事(ようじ)를 잊어버리고 말았습니다.
중요한 볼일을 잊어버리고 말았습니다.

[용어 체크]
用事(ようじ): 볼일, 해야 할 일` 
            },
            { 
                q: "歩く", 
                r: "あるく", 
                m: "걷다", 
                u: "동사 / 1형 자동사", 
                e: `公園(こうえん)을 함께 걸읍시다.
공원을 함께 걸읍시다.

[연관 팁]
1. 수단 표현: 歩いて(あるいて, 걸어서)
2. 명사형: 歩き(あるき, 걸음)` 
            }
        ];

        let currentIndex = 0;
        const totalSpan = document.getElementById('total');
        totalSpan.innerText = words.length;

        // 초기 실행
        updateCard();

        function updateCard() {
            if (words.length === 0) return;
            
            const word = words[currentIndex];
            document.getElementById('question').innerText = word.q;
            document.getElementById('reading').innerText = word.r;
            document.getElementById('meaning').innerText = word.m;
            document.getElementById('usage').innerText = "품사/역할: " + word.u;
            
            // \n을 <br>로 변환하여 HTML로 삽입
            document.getElementById('example').innerHTML = word.e.replace(/\n/g, '<br>');
            
            document.getElementById('answer').style.display = 'none';
            document.getElementById('current').innerText = currentIndex + 1;
        }

        function toggleAnswer() {
            const ans = document.getElementById('answer');
            ans.style.display = (ans.style.display === 'block') ? 'none' : 'block';
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }
    </script>
</body>
</html>
