<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N4 에이스 팀장 단어장</title>
    <style>
        :root { --primary: #4A90E2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #333; margin-bottom: 10px; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: transform 0.3s; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .card:active { transform: scale(0.98); }
        .question { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .answer { display: none; border-top: 1px solid #eee; pt: 20px; margin-top: 20px; text-align: left; }
        .reading { font-size: 1.2rem; color: #666; font-weight: bold; }
        .meaning { font-size: 1.1rem; color: #333; margin: 10px 0; }
        .usage { font-size: 0.9rem; color: #777; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .example { font-size: 1rem; color: var(--primary); margin-top: 15px; font-weight: 500; }
        .nav { margin-top: 25px; display: flex; gap: 10px; width: 100%; justify-content: center; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .prev { background: #ccc; color: white; }
        .next { background: var(--primary); color: white; flex-grow: 1; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #999; }
    </style>
</head>
<body>

    <h1>🎴 오늘의 단어 카드</h1>
    <div class="container">
        <div class="card" onclick="toggleAnswer()">
            <div id="question" class="question">最近</div>
            <div id="answer" class="answer">
                <div id="reading" class="reading">さいきん</div>
                <div id="meaning" class="meaning">요즘, 최근</div>
                <div id="usage" class="usage">품사: 부사 / 뉘앙스: 한국어 "요즘"에 가장 가깝고 문장 어디에도 자연스럽게 들어감.</div>
                <div id="example" class="example">最近(さいきん)、忙(いそが)しいです。</div>
            </div>
        </div>

        <div class="nav">
            <button class="prev" onclick="prevCard()">이전</button>
            <button class="next" onclick="nextCard()">다음 카드</button>
        </div>
        <div class="status"><span id="current">1</span> / <span id="total">12</span></div>
    </div>

    <script>
        const words = [
    { 
        q: "最近", 
        r: "さいきん", 
        m: "요즘, 최근", 
        u: "부사 / 시간의 흐름상 '요즘'을 나타내며 문장 앞부분에 자주 쓰임.", 
        e: "最近(さいきん)、あまり 暑(あつ)く ありません。" 
    },
    { 
        q: "若者", 
        r: "わかもの", 
        m: "젊은이, 청년", 
        u: "명사 / '젊은 사람'을 뜻하며 N4 시험 독해 지문에 자주 등장함.", 
        e: "最近(さいきん)の 若者(わかもの)は、お酒(さけ)を 飲み(のみ)ません。" 
    },
    { 
        q: "考え", 
        r: "かんがえ", 
        m: "생각, 의견", 
        u: "명사 / '좋은 생각(いい考え)' 처럼 명사로 쓰이는 형태에 익숙해질 것.", 
        e: "田中(たなか)さんは、いい 考え(かんがえ)が あります。" 
    },
    { 
        q: "傾向", 
        r: "けいこう", 
        m: "경향, 추세", 
        u: "명사 / '~하는 사람이 많아지고 있다'는 문맥에서 주로 쓰임.", 
        e: "肉(にく)を 食べない 傾向(けいこう)が あります。" 
    },
    { 
        q: "事件", 
        r: "じけん", 
        m: "사건, 사고", 
        u: "명사 / 뉴스나 신문 기사 관련 지문에 자주 나옴.", 
        e: "昨日(きのう)、大変(たいへん)な 事件(じけん)が ありました。" 
    },
    { 
        q: "環境", 
        r: "かんきょう", 
        m: "환경", 
        u: "명사 / '주변 환경'이나 '자연 환경'을 뜻함.", 
        e: "子(こ)どもの ために、いい 環境(かんきょう)を 作りましょう。"
    },
    { 
        q: "解決", 
        r: "かいけつ", 
        m: "해결", 
        u: "명사/동사 / 문제(問題)나 질문(質問)과 세트로 자주 쓰임.", 
        e: "問題(もんだい)を 解決(かいけつ)したいです。" 
    },
    { 
        q: "日々", 
        r: "ひび", 
        m: "나날, 매일매일", 
        u: "명사 / '매일(毎日)'보다 조금 더 일상을 강조할 때 씀.", 
        e: "日々(ひび)の 生活(せいかつ)を 大切(たいせつ)に しています。<br/>매일의 생활을 소중히 하고 있습니다. 大切にする는 하나의 세트 표현입니다. 여기서 に는 → “~하게 / ~한 상태로” 라는 의미로, 형용동사를 부사처럼 만들어서 동사를 꾸며주는 역할입니다.즉, 大切だ → 大切に → 大切にする (소중하다 → 소중하게 → 소중하게 하다 = 소중히 여기다)" 
    },
    { 
        q: "患者", 
        r: "かんじゃ", 
        m: "환자", 
        u: "명사 / 병원(病院)이나 약(薬) 관련 지문에 등장.", 
        e: "病院(びょういん)に 患者(かんじゃ)が たくさん います。" 
    },
    { 
        q: "救う", 
        r: "すくう", 
        m: "구하다, 살리다", 
        u: "동사 / 위험한 상황에서 도움을 주는 행동.", 
        e: "犬(いぬ)を 救(すく)った 人(ひと)は 有名(ゆうめい)です。" 
    },
    { 
        q: "重要性", 
        r: "じゅうようせい", 
        m: "중요성", 
        u: "명사 / '중요하다(大切だ/重要だ)'의 명사 확장형.", 
        e: "水(みず)の 重要性(じゅうようせい)を 知りました。" 
    },
    { 
        q: "集中力", 
        r: "しゅうちゅうりょく", 
        m: "집중력", 
        u: "명사 / 공부나 일에 몰입하는 힘. 장음(う) 발음에 주의.", 
        e: "夜(よる)は 集中力(しゅうちゅうりょく)が 高くなります。" 
    }
];

        let currentIndex = 0;
        const totalSpan = document.getElementById('total');
        totalSpan.innerText = words.length;

        function updateCard() {
            const word = words[currentIndex];
            document.getElementById('question').innerText = word.q;
            document.getElementById('reading').innerText = word.r;
            document.getElementById('meaning').innerText = word.m;
            document.getElementById('usage').innerText = "품사/역할: " + word.u;
            document.getElementById('example').innerText = "예시) " + word.e;
            document.getElementById('answer').style.display = 'none';
            document.getElementById('current').innerText = currentIndex + 1;
        }

        function toggleAnswer() {
            const ans = document.getElementById('answer');
            ans.style.display = (ans.style.display === 'block') ? 'none' : 'block';
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }
    </script>
</body>
</html>
