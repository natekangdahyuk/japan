<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다혁 일본어 학습 - K-STUDY INDEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --text-main: #e0e0e0;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'BIZ UDGothic', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 450px;
            padding: 10px 0;
            text-align: left;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: 0.8rem;
            color: var(--accent);
            color: #ff9800;
            font-weight: bold;
        }

        .season-section {
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            --season-point: #4CAF50;
            --season-btn: #2e7d32;
            --season-random: #1b5e20;
            --season-random-hover: #2e7d32;
        }

        .season-title { color: var(--season-point); }
        .btn-num { background-color: var(--season-btn); }
        .btn-num:hover { background-color: var(--season-point); }

        .season-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .season-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-num {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-num:active { transform: scale(0.9); }

        .loading-msg {
            width: 100%;
            max-width: 450px;
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
        }

        .footer {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇯🇵 DA-HYUK JAPANESE <span style="color: #ff9800;">[K-MODE]</span></h1>
    </div>

    <div id="seasons-root" class="loading-msg">시즌 목록 불러오는 중…</div>

    <div class="footer">
        © 2026 Dahyuk. K-MODE (한글 보고 일본어 맞히기)<br>
        모든 학습 데이터는 kStudy를 통해 구동됩니다.
    </div>

    <script src="js/season-index.js"></script>
    <script>
        SeasonIndex.init({
            studyPage: 'kStudy',
            emptyMessage: '시즌 데이터를 찾을 수 없습니다. 로컬 서버(http://localhost:3082)로 열어 주세요.',
            errorMessage: '목록을 불러오지 못했습니다. file:// 대신 로컬 서버로 열어 주세요.',
            discover: SeasonIndex.discoverLocalSeasons
        });
    </script>
</body>
</html>
