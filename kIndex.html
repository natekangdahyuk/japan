    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --s1-point: #4CAF50;
            --s2-point: #1976d2;
            --s3-point: #8e24aa;
            --s4-point: #ff9800;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'BIZ UDGothic', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 450px;
            padding: 10px 0;
            text-align: left;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: 0.8rem;
            color: var(--accent);
            color: #ff9800;
            font-weight: bold;
        }

        .season-section {
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .season-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .season-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .season-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-num {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-num:active { transform: scale(0.9); }

        /* 시즌별 컬러링 */
        .s1 .season-title { color: var(--s1-point); }
        .s1 .btn-num { background-color: #2e7d32; }
        .s1 .btn-num:hover { background-color: var(--s1-point); }

        .s2 .season-title { color: var(--s2-point); }
        .s2 .btn-num { background-color: #1565c0; }
        .s2 .btn-num:hover { background-color: var(--s2-point); }

        .s3 .season-title { color: var(--s3-point); }
        .s3 .btn-num { background-color: #6a1b9a; }
        .s3 .btn-num:hover { background-color: var(--s3-point); }

        .s4 .season-title { color: var(--s4-point); }
        .s4 .btn-num { background-color: #e65100; }
        .s4 .btn-num:hover { background-color: var(--s4-point); }

        .btn-random {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .footer {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
