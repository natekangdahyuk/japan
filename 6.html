<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6번 학습 페이지 - 태풍의 밤 (스토리북)</title>
    <style>
        :root { --primary: #4A90E2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #333; margin-bottom: 10px; font-size: 1.5rem; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: transform 0.3s; min-height: 320px; display: flex; flex-direction: column; justify-content: center; }
        .card:active { transform: scale(0.98); }
        .question { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .answer { display: none; border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; text-align: left; }
        .reading { font-size: 1.2rem; color: #666; font-weight: bold; }
        .meaning { font-size: 1.1rem; color: #333; margin: 10px 0; }
        .usage { font-size: 0.9rem; color: #777; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .example { font-size: 0.95rem; color: var(--primary); font-weight: 500; line-height: 1.6; }
        .nav { margin-top: 25px; display: flex; gap: 10px; width: 100%; justify-content: center; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .prev { background: #ccc; color: white; }
        .next { background: var(--primary); color: white; flex-grow: 1; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #999; text-align: center; }
    </style>
</head>
<body>
    <h1>🌪️ 태풍의 밤 (6번 스토리 카드)</h1>
    <div class="container">
        <div class="card" onclick="toggleAnswer()">
            <div id="question" class="question"></div> 
            <div id="answer" class="answer">
                <div id="reading" class="reading"></div>
                <div id="meaning" class="meaning"></div>
                <div id="usage" class="usage"></div>
                <div id="example" class="example"></div>
            </div>
        </div>
        <div class="nav">
            <button class="prev" onclick="prevCard()">이전</button>
            <button class="next" onclick="nextCard()">다음 카드</button>
        </div>
        <div class="status"><span id="current">1</span> / <span id="total">18</span></div>
    </div>

    <script>
        const words = [    
            { 
                q: "下ろす", r: "おろす", m: "찾다, 인출하다", u: "동사 / 1형 타동사", 
                e: `台風(たいふう)が 来(く)る 前(まえ)に、銀行(ぎんこう)で お金を 下ろしました。
태풍이 오기 전에, 은행에서 돈을 찾았습니다.

[연관 팁]
1. 덩어리: お金を 下ろす (돈을 인출하다)
2. 정중과거: 下ろしました` 
            },
            { 
                q: "預ける", r: "あずける", m: "맡기다", u: "동사 / 2형 타동사", 
                e: `大事(だいじ)な 荷物(にもつ)を 安全(あんぜん)な 場所(ばしょ)に 預けました。
중요한 짐을 안전한 장소에 맡겼습니다.

[연관 팁]
1. 반대말: 預(あず)かる (맡다/보관하다)
2. 조사: ~に 預ける (~에 맡기다)` 
            },
            { 
                q: "窓", r: "まど", m: "창문", u: "명사", 
                e: `強い(つよい) 風(かぜ)が 吹(ふ)くので、窓を 閉(し)めました。
강한 바람이 불어서, 창문을 닫았습니다.

[연관 팁]
1. 동사 세트: 窓を 閉(し)める (창문을 닫다)
2. 窓を 開(あ)ける (창문을 열다)` 
            },
            { 
                q: "揺れる", r: "ゆれる", m: "흔들리다", u: "동사 / 2형 자동사", 
                e: `風(かぜ)が 強(つよ)くて、家(うち)が ずっと 揺れています。
바람이 강해서, 집이 내내 흔들리고 있습니다.

[연관 팁]
1. 상태: 揺(ゆ)れている (흔들리고 있다)
2. 명사: 揺(ゆ)れ (흔들림)` 
            },
            { 
                q: "ずっと", r: "ずっと", m: "내내, 훨씬", u: "부사", 
                e: `昨日(きのう)から ずっと 雨(あめ)が 降(ふ)っています。
어제부터 내내 비가 내리고 있습니다.

[연관 팁]
1. 지속: 내내 이어진다는 느낌.
2. 비교: 以前(いぜん)より ずっと (이전보다 훨씬)` 
            },
            { 
                q: "ひどい", r: "ひどい", m: "심하다, 지독하다", u: "이형용사", 
                e: `外(そと)は 雨(あめ)と 風(かぜ)가 本当(ほんとう)に ひどいです。
밖은 비와 바람이 정말로 심합니다.

[연관 팁]
1. 부사형: ひどく (심하게)
2. 명사 수식: ひどい 被害(ひがい) (심한 피해)` 
            },
            { 
                q: "ひ도쿠나루", r: "ひどくなる", m: "심해지다", u: "동사 / 1형 자동사", 
                e: `夜(よる)に なって、台風(たいふう)が もっと ひどくなりました。
밤이 되어서, 태풍이 더 심해졌습니다.

[연관 팁]
1. 변화: ひどい + なる (~해지다)
2. 정중과거: ひどくなりました` 
            },
            { 
                q: "ひ도쿠낫테루", r: "ひどくなっている", m: "심해지고 있다", u: "진행/상태", 
                e: `今(いま) 外(そと)の 状況(じょうきょう)が どんどん ひどくなっています。
지금 밖의 상황이 점점 더 심해지고 있습니다.

[연관 팁]
1. 강조: どんどん (점점/팍팍)과 자주 쓰임.
2. 구어체: ひどくなってる (회화에서 줄여 씀)` 
            },
            { 
                q: "怖い", r: "こわい", m: "무섭다", u: "이형용사", 
                e: `外(そと)の 音(おと)が 大き(おおき)くて、とても 怖いです。
밖의 소리가 커서, 매우 무섭습니다.

[연관 팁]
1. 감정: 내가 느끼는 공포.
2. 덩어리: 怖い 思い(おもい)を する (무서운 경험을 하다)` 
            },
            { 
                q: "気がする", r: "きがする", m: "~인 느낌이 든다", u: "관용구", 
                e: `窓(まど)が 壊(こわ)れそうな 気がします。
창문이 부서질 것 같은 느낌이 듭니다.

[연관 팁]
1. 추측: 확신은 없지만 체감상 그럴 것 같을 때 사용.
2. 덩어리: ~な 気がする / ~する 気がする` 
            },
            { 
                q: "壊れる", r: "こわれる", m: "부서지다, 고장나다", u: "동사 / 2형 자동사", 
                e: `風(かぜ)で 庭(にわ)の 椅子(いす)が 壊れました。
바람 때문에 마당의 의자가 부서졌습니다.

[연관 팁]
1. 타동사: 壊(こわ)す (부수다)
2. 상태: 壊(こわ)れている (부서져 있다/고장 나 있다)` 
            },
            { 
                q: "だよね", r: "だよね", m: "그치? 맞지?", u: "종조사 (회화)", 
                e: `「台風(たいふう)は 本当(ほんとう)に 怖い(こわい)だよね。」
"태풍은 정말로 무섭지, 그치?"

[연관 팁]
1. 공감: 상대방의 동의를 강하게 구할 때 사용.
2. 반말: 친구나 아랫사람에게만 사용.` 
            },
            { 
                q: "できるだけ", r: "できるだけ", m: "가능한 한", u: "부사", 
                e: `危ない(あぶない)ですから、できるだけ 外(そと)に 出(で)ないで ください。
위험하니까, 가능한 한 밖에 나가지 말아 주세요.

[연관 팁]
1. 세트: できるだけ 早く(はやく) (가능한 한 빨리)` 
            },
            { 
                q: "外出", r: "がいしゅつ", m: "외출", u: "명사", 
                e: `今日(きょう)は 台風(たいふう)なので、外出を 控(ひか)えます。
오늘은 태풍이라서, 외출을 삼갑니다.

[연관 팁]
1. 동사 세트: 外出(がいしゅつ)を 控(ひか)える (외출을 자제하다)` 
            },
            { 
                q: "しんどい", r: "しんどい", m: "힘들다, 벅차다", u: "이형용사", 
                e: `ずっと 立(た)っていたので、足(あし)が しんどいです。
내내 서 있어서, 다리가 힘듭니다.

[연관 팁]
1. 뉘앙스: 육체적/정신적으로 고달플 때 쓰는 구어체.` 
            },
            { 
                q: "宿題", r: "しゅくだい", m: "숙제", u: "명사", 
                e: `外(そと)に 出(で)られませんから、家(うち)で 宿題を しました。
밖에 나갈 수 없어서, 집에서 숙제를 했습니다.

[연관 팁]
1. 덩어리: 宿題(しゅくだい)を 出(だ)す (숙제를 내다)` 
            },
            { 
                q: "おすすめ", r: "おすすめ", m: "추천", u: "명사", 
                e: `この アニメ(あにめ)は 私(わたし)の おすすめです。
이 애니메이션은 제가 추천하는 것입니다.

[연관 팁]
1. 조사: ~が おすすめです (~를 추천합니다)` 
            },
            { 
                q: "進む", r: "すすむ", m: "나아가다, 진행되다", u: "동사 / 1형 자동사", 
                e: `台風(たいふう)が 北(きた)へ 進んで います。
태풍이 북쪽으로 나아가고 있습니다.

[연관 팁]
1. 타동사: 進(すす)める (진행시키다)
2. 덩어리: 復旧(ふっきゅう)が 進(すす)む (복구가 진행되다)` 
            }
        ];

        let currentIndex = 0;
        window.onload = function() {
            const hash = window.location.hash;
            if (hash && hash.startsWith('#card')) {
                const index = parseInt(hash.replace('#card', '')) - 1;
                if (index >= 0 && index < words.length) { currentIndex = index; }
            }
            document.getElementById('total').innerText = words.length;
            updateCard();
        };

        function updateCard() {
            if (words.length === 0) return;
            const word = words[currentIndex];
            document.getElementById('question').innerText = word.q;
            document.getElementById('reading').innerText = word.r;
            document.getElementById('meaning').innerText = word.m;
            document.getElementById('usage').innerText = "품사/역할: " + word.u;
            document.getElementById('example').innerHTML = word.e.replace(/\n/g, '<br>');
            document.getElementById('answer').style.display = 'none';
            document.getElementById('current').innerText = currentIndex + 1;
            history.replaceState(null, null, "#card" + (currentIndex + 1));
        }

        function toggleAnswer() {
            const ans = document.getElementById('answer');
            ans.style.display = (ans.style.display === 'block') ? 'none' : 'block';
        }

        function nextCard() { currentIndex = (currentIndex + 1) % words.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + words.length) % words.length; updateCard(); }
    </script>
</body>
</html>
