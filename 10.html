<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다혁 전용 일본어 학습 - 시즌 2 (v1.3)</title>
    <style>
        :root { --primary: #1976d2; --bg: #f0f4f8; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #333; margin-bottom: 10px; font-size: 1.5rem; text-align: center; }
        .container { width: 100%; max-width: 500px; }
        
        /* 카드 클릭 이벤트 제거 및 커서 변경 */
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1); text-align: center; min-height: 350px; display: flex; flex-direction: column; justify-content: center; position: relative; cursor: default; }
        
        .q-text { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; color: #333; word-break: keep-all; }
        
        /* 정답 섹션 */
        .ans-section { display: none; border-top: 1px solid #eee; padding-top: 15px; text-align: left; }
        .info-line { font-size: 1.1rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; text-align: center; background: #e3f2fd; padding: 10px; border-radius: 8px; }
        
        .example-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .jp-ex { font-size: 1.1rem; color: #333; margin-bottom: 5px; font-weight: 500; }
        .kr-ex { font-size: 0.95rem; color: #666; }
        
        .tip-box { background: #fff9c4; padding: 12px; border-radius: 8px; font-size: 0.9rem; color: #5d4037; line-height: 1.5; border-left: 5px solid #fbc02d; }

        /* 메인 버튼 스타일 */
        .nav-main { margin-top: 25px; display: flex; gap: 10px; width: 100%; }
        button { padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1; }
        .btn-view { background: #546e7a; color: white; }
        .btn-next { background: var(--primary); color: white; }
        button:active { transform: scale(0.98); opacity: 0.9; }

        /* 하단 보조 링크 스타일 */
        .nav-sub { margin-top: 20px; display: flex; gap: 20px; justify-content: center; }
        .nav-sub a { text-decoration: none; color: #888; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .nav-sub a:hover { color: var(--primary); }

        .progress { margin-bottom: 10px; font-size: 0.9rem; color: var(--primary); font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="progress" id="progress-text">Card: 1 / 52</div>
    
    <div class="container">
        <div class="card">
            <div id="q-section" class="q-text">読み込み中...</div>
            <div id="ans-section" class="ans-section">
                <div class="info-line">
                    <span id="reading-text"></span> | <span id="mean-text"></span>
                </div>
                <div class="example-box">
                    <div id="jp-ex" class="jp-ex"></div>
                    <div id="kr-ex" class="kr-ex"></div>
                </div>
                <div id="tip-text" class="tip-box"></div>
            </div>
        </div>

        <div class="nav-main">
            <button class="btn-view" onclick="toggleAns()">내용 보기</button>
            <button class="btn-next" onclick="nextCard()">다음 카드</button>
        </div>

        <div class="nav-sub">
            <a onclick="prevCard()">이전</a>
            <a onclick="goToFirst()">처음</a>
            <a href="index.html">목록</a>
        </div>
    </div>

    <script>
      // 지침 준수: q(한글X), r(한자/한글X)
      const data = [
        { q: `引っ越し`, r: `ひっこし`, m: `이사`, jp: `来週、新しいマンションに引っ越しします.`, kr: `다음 주에 새 아파트로 이사합니다.`, tip: `끌 인(引)과 넘을 월(越)이 합쳐진 단어. 일본은 이사 후 이웃에게 선물을 돌리는 문화가 있어!` },
        { q: `ひっこし`, r: `ひっこし`, m: `이사`, jp: `引っ越しはとても大変でした.`, kr: `이사는 정말 힘들었습니다.`, tip: `동사형은 '引っ越す(ひっこす)'. '넘어가다'는 의미의 越가 들어가는 것에 주의!` },
        { q: `貯金`, r: `ちょきん`, m: `저금`, jp: `将来のために貯金をしています.`, kr: `장래를 위해서 저금을 하고 있습니다.`, tip: `쌓을 저(貯)와 쇠 금(金). 일본 우체국 은행 '유초은행'에서도 자주 보는 단어야.` },
        { q: `ちょきん`, r: `ちょきん`, m: `저금`, jp: `貯金가 全然ありません.`, kr: `저금이 전혀 없습니다.`, tip: `발음 '쵸킨'! '돈을 모으다'는 'お金を貯める(ためる)'라고도 표현해.` },
        { q: `貯める`, r: `ためる`, m: `모으다, 저축하다`, jp: `一万円貯めるのは難しいです.`, kr: `만 엔 모으는 것은 어렵습니다.`, tip: `돈뿐만 아니라 포인트나 스트레스가 쌓일 때도 이 단어를 써!` },
        { q: `ためる`, r: `ためる`, m: `모으다`, jp: `ストレスを貯めないでください.`, kr: `스트레스를 쌓지 마세요.`, tip: `자동사인 '貯まる(たまる) - 쌓이다'와 짝꿍으로 외워두면 좋아.` },
        { q: `～について`, r: `～について`, m: `~에 대해서`, jp: `僕について、どう思いますか？`, kr: `나에 대해서 어떻게 생각합니까?`, tip: `이야기의 주제를 나타낼 때 써. 명사 뒤에 바로 붙는 핵심 문법이야!` },
        { q: `キャンプ場`, r: `きゃんぷじょう`, m: `캠핑장`, jp: `週末にキャンプ場へ行きます.`, kr: `주말에 캠핑장에 갑니다.`, tip: `외래어 '캠프'와 한자 '장(場)'의 결합. '죠-'는 길게 빼주는 장음이야.` },
        { q: `ホタテ`, r: `ほたて`, m: `가리비`, jp: `北海道のホタテはとても美味しいです.`, kr: `홋카이도의 가리비는 정말 맛있습니다.`, tip: `조개껍데기가 돛(帆, ほ)을 세운 것 같다고 해서 '호타테'! 캠핑 단골 메뉴지.` },
        { q: `かぼちゃ`, r: `かぼちゃ`, m: `호박`, jp: `かぼちゃのスープを作りました.`, kr: `호박 수프를 만들었습니다.`, tip: `일본 단호박은 아주 달기로 유명해. 동지에 먹으면 감기에 안 걸린다는 풍습이 있어.` },
        { q: `とうもろこし`, r: `とうもろこし`, m: `옥수수`, jp: `屋台でとうもろこしを買いました.`, kr: `포장마차에서 옥수수를 샀습니다.`, tip: `한자가 어렵기로 유명하니 그냥 히라가나로 외우는 게 상책이야!` },
        { q: `～など`, r: `～など`, m: `~등, ~등등`, jp: `机の上に本やペンなどがあります.`, kr: `책상 위에 책이나 펜 등이 있습니다.`, tip: `여러 가지를 나열할 때 'AやBなど' 패턴으로 기억해!` },
        { q: `集まる`, r: `あつまる`, m: `모이다`, jp: `駅の前に人が集まっています.`, kr: `역 앞에 사람이 모여 있습니다.`, tip: `주어가 스스로 모이는 자동사! 타동사는 '集める(あつめる)'야.` },
        { q: `袋`, r: `ふくろ`, m: `봉지, 주머니`, jp: `この袋に入れてください.`, kr: `이 봉투에 넣어 주세요.`, tip: `물건 담는 주머니. 부엉이(フクロウ)와 발음이 비슷하니 헷갈리지 마!` },
        { q: `ビニール袋`, r: `びにーるぶくろ`, m: `비닐봉지`, jp: `ビニール袋は有料ですか？`, kr: `비닐봉지는 유료입니까?`, tip: `봉투(후쿠로)가 뒤에 붙으면서 발음이 '부쿠로'로 변하는 연탁 현상 주의!` },
        { q: `大気汚染`, r: `たいきおせん`, m: `대기오염`, jp: `大気汚染が問題になっています.`, kr: `대기오염이 문제가 되고 있습니다.`, tip: `발음이 한국어와 비슷해서 외우기 쉽지? 환경 뉴스 단골 단어야.` },
        { q: `中止`, r: `ちゅうし`, m: `중지`, jp: `雨で試合が中止になりました.`, kr: `비로 경기가 중지되었습니다.`, tip: `한자가 우리말과 똑같아. 발음은 '츄-시'!` },
        { q: `両親`, r: `りょうしん`, m: `부모님`, jp: `週末に両親に会います.`, kr: `주말에 부모님을 만납니다.`, tip: `양쪽 어버이라는 뜻. 남의 부모님은 '고료-신'이라고 높여 불러.` },
        { q: `試験`, r: `しけん`, m: `시험`, jp: `明日は日本語の試験があります.`, kr: `내일은 일본어 시험이 있습니다.`, tip: `JLPT도 '시켄'이지! 한자 험(験) 자 쓰기에 주의해.` },
        { q: `経験`, r: `けいけん`, m: `경험`, jp: `色々な経験をしたいです.`, kr: `다양한 경험을 하고 싶습니다.`, tip: `삶의 축적을 뜻하는 깊은 단어. 발음은 '케이켄'.` },
        { q: `野菜`, r: `やさい`, m: `야채, 채소`, jp: `毎日野菜を食べています.`, kr: `매일 야채를 먹고 있습니다.`, tip: `들(野)에서 자라는 나물(菜). 편의점 샐러드 코너 필수 단어!` },
        { q: `運転`, r: `うんてん`, m: `운전`, jp: `父は運転が上手です.`, kr: `아버지는 운전을 잘하십니다.`, tip: `운전면허는 '운텐 멘쿄'라고 해. 기계 조작에도 쓸 수 있어.` },
        { q: `化粧`, r: `けしょう`, m: `화장`, jp: `彼女は化粧が濃いです.`, kr: `그녀는 화장이 진합니다.`, tip: `화장실(케쇼-시츠)에서도 보는 단어. 화장을 지우는 건 '오토스'!` },
        { q: `歯`, r: `は`, m: `치아, 이`, jp: `ご飯を食べた後、歯を磨きます.`, kr: `밥을 먹은 후, 이를 닦습니다.`, tip: `치과는 '하이샤'. 잎(葉)과 발음이 같으니 한자로 구분해!` },
        { q: `石`, r: `いし`, m: `돌`, jp: `道に大きな石があります.`, kr: `길에 큰 돌이 있습니다.`, tip: `의지(意志)와 발음이 같아. '돌 위에서도 3년' 속담 기억나?` },
        { q: `太る`, r: `ふとる`, m: `살찌다`, jp: `最近、少し太りました.`, kr: `최근 조금 살쪘습니다.`, tip: `클 태(太)를 써. 반대말은 '야세루(살빠지다)'야.` },
        { q: `音`, r: `おと`, m: `소리`, jp: `隣の部屋から大きな音がします.`, kr: `옆방에서 큰 소리가 납니다.`, tip: `무생물의 소리! 사람 목소리는 '코에'라는 거 잊지 마.` },
        { q: `紙`, r: `かみ`, m: `종이`, jp: `この紙に名前を書いてください.`, kr: `이 종이에 이름을 써 주세요.`, tip: `신(神), 머리카락(髪)과 발음이 같아. 한자 구분이 실력이야!` },
        { q: `体験`, r: `たいけん`, m: `체험`, jp: `日本で茶道を体験しました.`, kr: `일본에서 다도를 체험했습니다.`, tip: `몸으로 직접 겪는 일시적 이벤트 성격이 강한 단어야.` }
      ];

      // 교차 반복 데이터 생성 (총 52개를 맞추기 위해)
      const allWords = [];
      data.forEach(item => {
          allWords.push({...item}); // 원래 데이터
          // 의미를 질문으로 던지는 교차 카드 추가 (한글 질문 허용 범위 내에서)
          allWords.push({
              q: item.m, 
              r: item.r, 
              m: item.q, 
              jp: item.jp, 
              kr: item.kr, 
              tip: item.tip + " (거꾸로 학습!)"
          });
      });

      let currentIndex = parseInt(localStorage.getItem('currentCardIndex_10_v1.3')) || 0;

      function showCard() {
        const word = allWords[currentIndex];
        document.getElementById('progress-text').innerText = `Card: ${currentIndex + 1} / ${allWords.length}`;
        document.getElementById('q-section').innerText = word.q;
        document.getElementById('reading-text').innerText = word.r;
        document.getElementById('mean-text').innerText = word.m;
        document.getElementById('jp-ex').innerText = word.jp;
        document.getElementById('kr-ex').innerText = word.kr;
        document.getElementById('tip-text').innerHTML = `<strong>💡 Tip:</strong> ${word.tip}`;
        
        document.getElementById('ans-section').style.display = 'none';
        localStorage.setItem('currentCardIndex_10_v1.3', currentIndex);
        window.location.hash = `card${currentIndex + 1}`;
      }

      function toggleAns() {
        const a = document.getElementById('ans-section');
        a.style.display = (a.style.display === 'none') ? 'block' : 'none';
      }

      function nextCard() {
        if (currentIndex < allWords.length - 1) {
          currentIndex++;
          showCard();
        }
      }

      function prevCard() {
        if (currentIndex > 0) {
          currentIndex--;
          showCard();
        }
      }

      function goToFirst() {
          currentIndex = 0;
          showCard();
      }

      window.onload = showCard;
    </script>
  </body>
</html>
