            { q: `音`, r: `おと`, m: `소리`, u: `명사`, jp: `隣の部屋から大きな音がします。`, kr: `옆방에서 큰 소리가 납니다.`, tip: `물건이나 자연에서 나는 소리예요. 사람의 목소리는 '声(こえ)'라고 하니 구분 필수!`, t: `한자→읽기` },

            { q: `たいけん`, r: `体験`, m: `체험`, u: `명사`, jp: `いい体験になりました。`, kr: `좋은 체험이 되었습니다.`, tip: `발음은 '타이켄'. '타이(体)'는 몸을 뜻하는 한자의 약자야.`, t: `읽기→한자` }
        ];
        
        const allWords = [...words, ...additionalWords];
        let currentIndex = parseInt(localStorage.getItem('currentCardIndex_10')) || 0;

        function showCard() {
            const word = allWords[currentIndex];
            document.getElementById('progress-text').innerText = `Card: ${currentIndex + 1} / ${allWords.length}`;
            document.getElementById('q-section').innerText = word.q;
            document.getElementById('ans-text').innerText = word.r;
            document.getElementById('mean-text').innerText = word.m;
            document.getElementById('unit-text').innerText = word.u;
            document.getElementById('jp-ex').innerText = word.jp;
            document.getElementById('kr-ex').innerText = word.kr;
            document.getElementById('tip-text').innerText = word.tip;
            
            document.getElementById('q-section').style.display = 'block';
            document.getElementById('ans-section').style.display = 'none';
            
            localStorage.setItem('currentCardIndex_10', currentIndex);
            window.location.hash = `card${currentIndex + 1}`;
        }

        function toggleAns() {
            const q = document.getElementById('q-section');
            const a = document.getElementById('ans-section');
            if (q.style.display === 'none') {
                q.style.display = 'block';
                a.style.display = 'none';
            } else {
                q.style.display = 'none';
                a.style.display = 'block';
            }
        }

        function nextCard() {
            if (currentIndex < allWords.length - 1) {
                currentIndex++;
                showCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                showCard();
            }
        }

        // 해시 변경 감지
        window.onhashchange = () => {
            const hash = window.location.hash.replace('#card', '');
            if (hash) {
                currentIndex = parseInt(hash) - 1;
                showCard();
            }
        };

        showCard();
