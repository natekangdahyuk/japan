<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 12</title>
    <style>
        :root {
            --primary: #1976d2; 
            --bg: #f0f4f8;
            --card-white: #ffffff;
            --tip-bg: #fff9c4;
            --accent: #e3f2fd;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        h1 { color: #333; margin-bottom: 10px; font-size: 1.5rem; text-align: center; }

        /* 카드 컨테이너 */
        #study-container { width: 90%; max-width: 450px; background: var(--card-white); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; cursor: default; }
        
        /* 문제 섹션 */
        .question { font-size: 40px; font-weight: 800; margin: 30px 0; color: #222; word-break: keep-all; }
        
        /* 정답 섹션 */
        .answer-section { display: none; border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; text-align: left; }
        .info-line { background: var(--accent); padding: 12px; border-radius: 12px; font-size: 18px; font-weight: bold; margin-bottom: 15px; color: var(--primary); text-align: center; }
        
        .example-box { background: #f8f9fa; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); margin-bottom: 15px; }
        .ex-jp { font-size: 17px; font-weight: 600; margin-bottom: 5px; color: #333; }
        .ex-kr { font-size: 14px; color: #666; line-height: 1.4; }
        
        .tip-box { background: var(--tip-bg); padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; color: #5d4037; border-left: 5px solid #fbc02d; }
        .tip-title { font-weight: bold; color: #d32f2f; margin-right: 5px; }

        /* 메인 버튼 (내용보기, 다음 카드) */
        .nav-main { margin-top: 25px; display: flex; gap: 10px; width: 100%; max-width: 450px; }
        .nav-main button { padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s; flex: 1; }
        .btn-view { background: #546e7a; color: white; }
        .btn-next { background: var(--primary); color: white; }
        .nav-main button:active { transform: scale(0.98); opacity: 0.9; }

        /* 하단 보조 링크 (이전, 처음, 목록) */
        .nav-sub { margin-top: 20px; display: flex; gap: 20px; justify-content: center; }
        .nav-sub a { text-decoration: none; color: #888; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .nav-sub a:hover { color: var(--primary); }

        .status { margin-top: 15px; font-size: 0.9rem; color: #999; text-align: center; }
    </style>
</head>
<body>

<h1>📘 학습 12</h1>

<div id="study-container">
    <div class="question" id="q-text">로딩중...</div>

    <div class="answer-section" id="answer-section">
        <div class="info-line">
            <span id="reading"></span> | <span id="meaning"></span>
        </div>

        <div class="example-box">
            <div class="ex-jp" id="ex-jp"></div>
            <div class="ex-kr" id="ex-kr"></div>
        </div>

        <div class="tip-box">
            <span class="tip-title">💡 Tip:</span>
            <span id="tip-content"></span>
        </div>
    </div>
</div>

<div class="nav-main">
    <button class="btn-view" onclick="toggleAnswer()">내용 보기</button>
    <button class="btn-next" onclick="nextCard()">다음 카드</button>
</div>

<div class="nav-sub">
    <a onclick="prevCard()">이전</a>
    <a onclick="goToFirst()">처음</a>
    <a href="index.html">목록</a>
</div>

<div class="status"><span id="current">1</span> / <span id="total">11</span></div>

<script>
    // 규칙 적용: q(한글X), r(한자/한글X)
    const data = [
        { q: `小麦粉`, r: `こむぎこ`, m: `밀가루`, jp: `小麦粉を使ってパンを焼きました。`, kr: `밀가루를 사용해서 빵을 구웠습니다.`, tip: `작은(小) 보리(麦)의 가루(粉)라는 뜻. 일본의 '코나몬(타코야키 등)' 요리의 핵심 재료!` },
        { q: `歯ブラシ`, r: `はぶらし`, m: `칫솔`, jp: `新しい歯ブラシを買いました.`, kr: `새 칫솔을 샀습니다.`, tip: `이(歯)를 닦는 브러시! 외래어 '브러시'가 합쳐진 단어입니다.` },
        { q: `歯磨き粉`, r: `はみがきこ`, m: `치약`, jp: `歯磨き粉をたっぷりつけます.`, kr: `치약을 듬뿍 묻힙니다.`, tip: `직역하면 '이 닦는 가루'. 옛날엔 가루 형태였기 때문에 '粉(코)'가 붙어있으니 밀가루(小麦粉)랑 같이 외우세요!` },
        { q: `できる`, r: `できる`, m: `생기다 / 가능하다`, jp: `日本でやりたいことができました.`, kr: `일본에서 하고 싶은 일이 생겼습니다.`, tip: `단순히 '할 수 있다' 외에도 '없던 것이 생기다', '요리가 완성되다' 등 쓰임새가 아주 넓습니다.` },
        { q: `気をつける`, r: `きをつける`, m: `조심하다`, jp: `台風ですから、気をつけてください.`, kr: `태풍이니까 조심하세요.`, tip: `내 마음의 기(気)를 상황에 착! 붙이다(つける)는 뜻에서 유래했습니다. 헤어질 때 '안녕' 대신 쓰기도 해요.` },
        { q: `お邪魔します`, r: `おじゃまします`, m: `실례합니다`, jp: `友達の家でお邪魔します.`, kr: `친구 집에서 실례하겠습니다(들어갑니다).`, tip: `수행을 방해하는 마귀(邪魔)가 된다는 겸손한 표현입니다. 남의 집 방문 시 필수 매너 인사!` },
        { q: `量`, r: `りょう`, m: `양`, jp: `砂糖の量を増やしてください.`, kr: `설탕의 양을 늘려 주세요.`, tip: `질(質, 시츠)보다는 양(量, 료-)! '늘리다(増やす)'와 함께 자주 쓰이는 단어입니다.` },
        { q: `上手だ`, r: `じょうずだ`, m: `능숙하다`, jp: `日本語がとても上手ですね！`, kr: `일본어가 정말 능숙하시네요!`, tip: `손이 위(上)에 있다는 뜻에서 실력이 좋음을 뜻합니다. 반대말은 하수(下手, 헤타)입니다.` },
        { q: `文章`, r: `ぶんしょう`, m: `문장`, jp: `長い文章を読みます.`, kr: `긴 문장을 읽습니다.`, tip: `단어(単語)가 모여 문장(文章)이 됩니다. 일본어 시험의 '독해' 파트에서 자주 보게 될 단어입니다.` },
        { q: `内容`, r: `ないよう`, m: `내용`, jp: `この話の内容は秘密です.`, kr: `이 이야기의 내용은 비밀입니다.`, tip: `안(内)에 수용(容)된 것, 즉 핵심 알맹이를 뜻합니다.` },
        { q: `かしこまりました`, r: `かしこまりました`, m: `알겠습니다 (정중)`, jp: `はい、かしこまりました.`, kr: `네, 알겠습니다(명심하겠습니다).`, tip: `가게 주인이 손님에게 쓰는 극존칭입니다. 다혁 사장님이 손님 모실 때 딱인 표현!` }
    ];

    let currentIndex = 0;

    function init() {
        const saved = localStorage.getItem('lastIndex_v1.3');
        const hash = window.location.hash.replace('#card', '');
        if (hash && !isNaN(hash)) currentIndex = parseInt(hash) - 1;
        else if (saved) currentIndex = parseInt(saved);
        showCard();
    }

    function showCard() {
        const item = data[currentIndex];
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('reading').innerText = item.r;
        document.getElementById('meaning').innerText = item.m;
        document.getElementById('ex-jp').innerText = item.jp;
        document.getElementById('ex-kr').innerText = item.kr;
        document.getElementById('tip-content').innerText = item.tip;
        document.getElementById('current').innerText = currentIndex + 1;
        document.getElementById('total').innerText = data.length;
        
        document.getElementById('answer-section').style.display = 'none';
        
        localStorage.setItem('lastIndex_v1.3', currentIndex);
        window.location.hash = `card${currentIndex + 1}`;
    }

    function toggleAnswer() {
        const ans = document.getElementById('answer-section');
        ans.style.display = (ans.style.display === 'none') ? 'block' : 'none';
    }

    function nextCard() { if (currentIndex < data.length - 1) { currentIndex++; showCard(); } }
    function prevCard() { if (currentIndex > 0) { currentIndex--; showCard(); } }
    function goToFirst() { currentIndex = 0; showCard(); }

    window.onload = init;
</script>
</body>
</html>
